# R2 Blueprint: scheduled_report — cron → query → render → email/sink.
# Wave [wave:s10/k3-w1-blueprint-library-15].

blueprint: scheduled_report
version: "1.0.0"
description: "Cron → DB-query → render (PDF/HTML/CSV) → email/file/S3."
tags: [scheduler, report, business]

params:
  - { name: route_id, type: string, required: true }
  - { name: cron_expr, type: string, required: true }
  - { name: query, type: string, required: true }
  - { name: template, type: string, required: true }
  - { name: format, type: string, required: true,
      description: "pdf | html | csv | xlsx" }
  - { name: recipients, type: array, required: false }

from:
  cron: ${blueprint.cron_expr}

steps:
  - db_query_external:
      sql: ${blueprint.query}
      to: body.rows
  - choice:
      when:
        - condition: "${blueprint.format} == 'pdf'"
          steps:
            - pdf_template:
                template_path: ${blueprint.template}
                context: { rows: body.rows }
                to: body.binary
        - condition: "${blueprint.format} == 'html'"
          steps:
            - html_template:
                template_path: ${blueprint.template}
                context: { rows: body.rows }
                to: body.binary
        - condition: "${blueprint.format} == 'csv'"
          steps:
            - csv_export: { rows: body.rows, to: body.binary }
        - condition: "${blueprint.format} == 'xlsx'"
          steps:
            - xlsx_export: { rows: body.rows, to: body.binary }
  - notify_cascade:
      recipients: ${blueprint.recipients}
      subject: "Report ${blueprint.route_id}"
      attachment: ${body.binary}
  - audit: { action: blueprint.scheduled_report.delivered }
