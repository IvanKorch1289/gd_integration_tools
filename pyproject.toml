    "pyarrow>=20.0.0,<25.0.0",
    # S31: force lxml to latest to prevent flagembedding→inscriptis→lxml downgrade.
    # inscriptis (dep of FlagEmbedding) requires lxml<6.1.0; override keeps core safe.
    # AI-2026 extra: install in isolated ML environments per NOTE above.
    "lxml>=6.1.1,<7.0.0",
    # S31: urllib3 1.26.20 entries in lock are PyPy-only markers (platform markers
    # restrict them to PyPy; CPython 3.14 correctly uses urllib3 2.7.0).
    # Dependabot scans the whole lock — force 2.7.0 for all platforms to clear
    # GHSA-38jv, GHSA-2xpw, GHSA-gm62 (CVE-2026-21441, CVE-2025-66471,
