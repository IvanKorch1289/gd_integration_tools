# Windows Worker — docker-compose service.
# Wave [wave:s6/k3-com-windows-sidecar].
# Rename windows-sidecar→windows_worker: Sprint 8 AUDIT-3 (2026-05-15).
#
# Запуск:
#   docker compose -f docker-compose.windows-worker.yml up -d windows-worker
#
# Требования:
#   * Docker Engine с Windows Containers (Windows host или WSL2 + DwS).
#   * Image сборка: docker compose -f docker-compose.windows-worker.yml build.
#   * --isolation=process (default для Windows containers).
#
# Backend-side взаимодействие — через ``services/rpa/com_sidecar_client.py``,
# управляется feature-flag ``com_sidecar_enabled``.

services:
  windows-worker:
    image: gd-windows-worker:py314
    build:
      context: ../..
      dockerfile: deploy/windows-worker/Dockerfile.windows
    container_name: gd-windows-worker
    isolation: process
    ports:
      - "9001:9001"
    environment:
      # API-key для аутентификации запросов от backend (см.
      # services/rpa/com_sidecar_client.py).
      COM_SIDECAR_API_KEY: ${COM_SIDECAR_API_KEY:-changeme}
      # Лимит одновременных COM-вызовов (предотвращение DoS).
      COM_MAX_CONCURRENT: "10"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "powershell"
        - "-Command"
        - "try { $r = Invoke-WebRequest -Uri http://localhost:9001/health -UseBasicParsing -TimeoutSec 4; if ($r.StatusCode -ne 200) { exit 1 } } catch { exit 1 }"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    labels:
      - "wave=s6/k3-com-windows-sidecar"
      - "component=windows-worker"
