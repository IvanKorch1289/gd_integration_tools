# ──────────────────────────────────────────────────────────────────────
# base.yml — общая нечувствительная конфигурация всех профилей
#
# Файл является единственным источником значений по умолчанию для
# параметров, не зависящих от окружения: timeouts, retries, pool_size,
# circuit_breaker_*, encoding, статические списки конечных точек, и т.п.
#
# Профильные файлы (config_profiles/{dev,dev_light,staging,prod}.yml)
# накладываются поверх base.yml через ``_deep_merge`` в
# ``src.core.config.config_loader.YamlConfigSettingsLoader``.
#
# Все секреты (api_key, password, *_secret, token, и т.п.) хранятся вне
# YAML — в env / Vault — и перечислены в .env.example.
#
# Двусторонний аудит:  ``python tools/config_audit.py``  (см. Makefile).
# ──────────────────────────────────────────────────────────────────────


vault:
  # Основной переключатель источника секретов. Override через env
  # VAULT_ENABLED (true/false). См. _is_vault_enabled в config_loader.
  enabled: true
  addr: "http://127.0.0.1:8200"
  secret_path: "secret/data/gd_integration_tools"


app:
  version: "0.1.0"
  title: "GD ADVANCED TOOLS"
  socket_ping_timeout: 10
  socket_close_timeout: 10
  gzip_minimum_size: 300
  gzip_compresslevel: 9
  enable_swagger: true
  enable_redoc: true


security:
  token_lifetime: 120
  refresh_token_lifetime: 4800
  algorithm: "HS256"
  request_timeout: 20.0
  rate_limit: 1000
  rate_time_measure_seconds: 60
  routes_without_api_key:
    - "/"
    - "/admin"
    - "/admin/*"
    - "/docs"
    - "/documents"
    - "/docs/"
    - "/openapi*"
    - "/asyncapi*"
    - "/documents/"
    - "/health"
    - "/ready"
    - "/metrics"
    - "/openapi.json"
    - "/tech/healthcheck-*"
    - "/tech/redirect-*"
    - "/tech/version"
    - "/tech/log-storage"
    - "/tech/file-storage"
    - "/tech/task-monitor"
    - "/tech/queue-monitor"


tasks:
  task_max_attempts: 5
  task_seconds_delay: 30
  task_retry_jitter_factor: 0.5
  task_timeout_seconds: 300
  flow_max_attempts: 5
  flow_seconds_delay: 900
  flow_retry_jitter_factor: 0.5
  flow_timeout_seconds: 90000


grpc:
  socket_path: "/tmp/order_service.sock"
  max_workers: 20


scheduler:
  default_jobstore_name: "default"
  backup_jobstore_name: "backup"
  executors:
    default:
      type: "threadpool"
      max_workers: 20
    async:
      type: "asyncio"
  misfire_grace_time: 60
  max_instances: 1
  timezone: "Europe/Moscow"
  coalesce: true


http:
  max_retries: 3
  retry_backoff_factor: 0.5
  retry_status_codes:
    - 408
    - 429
    - 500
    - 502
    - 503
    - 504
  total_timeout: 30
  connect_timeout: 10
  sock_read_timeout: 15
  keepalive_timeout: 300
  limit: 100
  limit_per_host: 20
  ttl_dns_cache: 300
  force_close: false
  ssl_verify: false
  waf_url: "esbgreendata"
  waf_route_header:
    x-api-key: "esbgreendata"
  circuit_breaker_max_failures: 5
  circuit_breaker_reset_timeout: 30
  enable_connection_purging: true
  purging_interval: 300


database:
  # Drivers — PostgreSQL defaults. Для Oracle переопределить в overlay
  # профиля: async_driver=oracledb, sync_driver=oracledb (валидируется
  # в DatabaseConnectionSettings.validate_oracle_drivers).
  # SQLite-драйверы выбираются принудительно в _build_dsn (aiosqlite/pysqlite).
  async_driver: "asyncpg"
  sync_driver: "psycopg2"
  echo: false
  pool_size: 10
  max_overflow: 10
  pool_recycle: 1800
  pool_timeout: 30
  connect_timeout: 10
  command_timeout: 30
  max_retries: 0
  circuit_breaker_max_failures: 10
  circuit_breaker_reset_timeout: 30
  slow_query_threshold: 1.0


external_databases:
  echo: false
  pool_size: 5
  max_overflow: 5
  pool_recycle: 1800
  pool_timeout: 30
  connect_timeout: 10
  command_timeout: 30
  max_retries: 0
  circuit_breaker_max_failures: 5
  circuit_breaker_reset_timeout: 30
  slow_query_threshold: 1.0
  connections: []


redis:
  encoding: "utf-8"
  cache_expire_seconds: 300
  max_connections: 20
  socket_timeout: 600
  socket_connect_timeout: 60
  retry_on_timeout: true
  max_stream_len: 1000
  approximate_trimming_stream: true
  retention_hours_stream: 8
  max_retries: 3
  ttl_hours: 1
  health_check_interval: 300
  streams:
    - name: "email"
      value: "email-notification-stream"
    - name: "order-send"
      value: "order-send-to-skb-stream"
    - name: "order-get-result"
      value: "order-get-result-from-skb-stream"
    - name: "order-pipeline"
      value: "order-start-pipeline_stream"
    - name: "actions"
      value: "actions-stream"


cache:
  backend: "redis"
  l1_enabled: true
  l1_maxsize: 1000
  keydb_active_replica: false


mongo:
  timeout: 5000
  max_pool_size: 10
  min_pool_size: 5


mail:
  connection_pool_size: 10
  command_timeout: 30
  connect_timeout: 10
  use_tls: false
  validate_certs: false
  circuit_breaker_max_failures: 15
  circuit_breaker_reset_timeout: 60


queue:
  timeout: 60
  reconnect_interval: 30
  max_consumers: 20
  graceful_timeout: 30
  use_ssl: false
  queues:
    - name: "order-create"
      value: "order-init-create-queue"
    - name: "order-send"
      value: "order-send-queue"


fs:
  timeout: 30
  retries: 5
  key_prefix: "uploads"
  max_pool_connections: 20
  read_timeout: 30


log:
  udp_port: 12201
  use_tls: false
  level: "DEBUG"
  name_log_file: "app.log"
  dir_log_name: "logs"
  log_requests: true
  max_body_log_size: 4096
  required_fields:
    - "environment"
    - "hostname"
    - "user_id"
    - "action"
  conf_loggers:
    - name: "application"
      facility: "application"
    - name: "database"
      facility: "database"
    - name: "storage"
      facility: "storage"
    - name: "smtp"
      facility: "smtp"
    - name: "scheduler"
      facility: "scheduler"
    - name: "request"
      facility: "request"
    - name: "tasks"
      facility: "tasks"
    - name: "redis"
      facility: "redis"
    - name: "stream"
      facility: "stream"
    - name: "grpc"
      facility: "grpc"


skb:
  endpoints:
    GET_KINDS: "Kinds"
    CREATE_REQUEST: "Create"
    GET_RESULT: "Result"
    GET_ORDER_LIST: "List"
    CHECK_ADDRESS: "CheckAddress"
  default_priority: 80
  connect_timeout: 10.0
  read_timeout: 30.0


dadata:
  endpoints:
    GEOLOCATE: "geolocate/address"
  geolocate_radius_default: 100
  connect_timeout: 15.0
  read_timeout: 40.0


antivirus:
  endpoints:
    SCAN_FILE: "/check/check"
  multipart_field_name: null
  default_content_type: "application/octet-stream"
  default_headers: {}
  connect_timeout: 10.0
  read_timeout: 120.0
  total_timeout: 130.0
  max_retries: 2
  retry_backoff_factor: 1.0
  raise_for_status: true
  response_type: "auto"


# ────────── Orphan-классы (W20.1): минимально декларативно ──────────
# Все поля имеют defaults в моделях; здесь — явные значения для
# видимости и удобства tuning'а через overlay.

elasticsearch:
  enabled: false
  index_prefix: "gd_"
  request_timeout: 30
  max_retries: 3
  verify_certs: true
  hosts:
    - "http://localhost:9200"


clickhouse:
  enabled: false
  host: "localhost"
  port: 9000
  http_port: 8123
  database: "default"
  user: "default"
  secure: false
  connect_timeout: 10
  send_receive_timeout: 300
  max_batch_size: 10000


cert_store:
  backend: "postgres"
  hot_cache_ttl: 300
  vault_path: "secret/certs"
  mongo_collection: "certs"
  expire_warn_days: 30


rag:
  enabled: false
  vector_backend: "qdrant"
  qdrant_url: "http://localhost:6333"
  qdrant_collection: "gd_rag"
  chroma_host: "localhost"
  chroma_port: 8000
  chroma_collection: "gd_rag"
  embedding_provider: "sentence-transformers"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5


perplexity:
  model: "sonar"
  base_url: "https://api.perplexity.ai"
  use_waf: true
  max_tokens: 4096
  temperature: 0.7


huggingface:
  model: "mistralai/Mixtral-8x7B-Instruct-v0.1"
  base_url: "https://api-inference.huggingface.co/models"
  use_waf: true
  max_tokens: 2048
  temperature: 0.7


open_webui:
  model: "llama3"
  base_url: "http://localhost:3000"
  use_waf: false
  max_tokens: 4096
  temperature: 0.7


openrouter:
  model: "openrouter/auto"
  base_url: "https://openrouter.ai/api/v1"
  use_waf: true
  max_tokens: 4096
  temperature: 0.7


nim:
  model: "meta/llama-3.1-70b-instruct"
  base_url: "https://integrate.api.nvidia.com/v1"
  use_waf: true
  max_tokens: 4096
  temperature: 0.7


openai:
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"
  use_waf: false
  max_tokens: 4096
  temperature: 0.7


ai_providers:
  default_provider: "perplexity"
  fallback_chain:
    - "perplexity"
    - "huggingface"
    - "open_webui"
    - "openrouter"
    - "nim"
    - "openai"
  enable_data_sanitization: true
  sanitize_emails: true
  sanitize_phones: true
  sanitize_inn: true
  sanitize_snils: true
  sanitize_passport: true
  sanitize_card_numbers: true
  sanitize_api_keys: true
  custom_sensitive_fields: []
  connect_timeout: 10.0
  read_timeout: 60.0


express:
  enabled: false
  connect_timeout: 10.0
  read_timeout: 30.0
  max_retries: 2
  retry_backoff_factor: 1.0
  signature_header: "X-Signature"
  callback_url: ""
  botx_url: "https://botx.corp.example.ru"
  botx_host: ""
  default_chat_id: ""
  extra_bots: []


telegram:
  enabled: false
  connect_timeout: 10.0
  read_timeout: 30.0
  max_retries: 2
  retry_backoff_factor: 1.0
  signature_header: "X-Signature"
  callback_url: ""
  base_url: "https://api.telegram.org"
  default_chat_id: ""
  parse_mode: "HTML"
  disable_notification: false
  polling_mode: false
