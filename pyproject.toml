    "apscheduler>=3.11.0,<4.0.0",
    "croniter>=2.0.0,<3.0.0",
    "faststream[kafka]>=0.6.7,<1.0.0",
    "aiokafka>=0.12.0,<1.0.0",
    "grpcio>=1.70.0,<2.0.0",
    "protobuf>=5.29.3,<6.0.0",
    "aio-pika>=9.5.5,<10.0.0",
    "aiofiles>=24.1.0,<25.0.0",
    "fastapi-pagination>=0.12.34,<1.0.0",
    "tenacity>=9.0.0,<10.0.0",
    "asyncpg>=0.31.0,<1.0.0",
    "orjson>=3.11.8,<4.0.0",
    "diskcache>=5.6.3,<6.0.0",  # SECURITY 2026-06-05: NO FIX for CVE-2025-69872; project mitigates via JSONDisk (см. .github/workflows/security.yml, S30)
    "strawberry-graphql[fastapi]>=0.262.0",
    "jmespath>=1.0.1,<2.0.0",
    "beautifulsoup4>=4.12.3,<5.0.0",
