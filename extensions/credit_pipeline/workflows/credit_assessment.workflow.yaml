# Workflow DSL: credit_assessment (Sprint 7 Team T3)
#
# Wave: [wave:s7/team-03-credit-1st-client].
# Использует Workflow DSL (Sprint 4 K4 — LLM-activity + Temporal compiler).
# Семантика — Temporal-based durable execution через WorkflowDeclaration.
#
# Декларация под feature_flag.credit_pipeline_v2 (default-OFF):
# * при ON — workflow доступен через DSL `.invoke_workflow("credit_assessment")`;
# * при OFF — игнорируется loader'ом.
#
# Структура: BPMN-like steps с error_path для compensation.

name: credit_assessment
version: "1.0"
description: Кредитная оценка по запросу SKB-Техно + НБКИ + scoring правила.

# Декларативные activity (Temporal activities в src/backend/services/ai/workflow_activities.py
# либо bound через capability gate).
activities:
  - name: fetch_skb_report
    description: Получить SKB-Техно отчёт по залогу.
    function: extensions.credit_pipeline.services.clients.skb:fetch_for_workflow
    timeout_seconds: 30
    retry:
      maximum_attempts: 3
      backoff_coefficient: 2.0

  - name: fetch_nbki_report
    description: Получить НБКИ кредитную историю.
    function: extensions.credit_pipeline.services.clients.skb:fetch_for_workflow
    timeout_seconds: 30
    retry:
      maximum_attempts: 3
      backoff_coefficient: 2.0

  - name: normalize_responses
    description: Нормализовать ответы через apply_rules.
    function: extensions.credit_pipeline.functions.normalize:apply_rules
    timeout_seconds: 5

  - name: publish_decision
    description: Публикация финального решения через credit.events.* MQ.
    function: extensions.credit_pipeline.functions.publish:emit_decision
    timeout_seconds: 10

# Workflow execution-graph (BPMN-style).
steps:
  - id: start
    type: start

  - id: parallel_fetch
    type: parallel
    branches:
      - [fetch_skb]
      - [fetch_nbki]

  - id: fetch_skb
    type: activity
    activity: fetch_skb_report
    on_error: compensate_skb

  - id: fetch_nbki
    type: activity
    activity: fetch_nbki_report
    on_error: compensate_nbki

  - id: normalize
    type: activity
    activity: normalize_responses

  - id: scoring_rules
    type: rule_engine
    rules:
      - name: approve
        expr: "score >= 700"
        decision: APPROVE
      - name: manual_review
        expr: "score >= 500"
        decision: MANUAL_REVIEW
    decision_to: body.final_decision
    default_decision: REJECT

  - id: publish
    type: activity
    activity: publish_decision

  - id: end
    type: end

# Compensation chain (saga rollback).
compensation:
  - id: compensate_skb
    type: noop
    description: SKB не имеет mutating-эффекта — compensation noop.
  - id: compensate_nbki
    type: noop
    description: НБКИ не имеет mutating-эффекта — compensation noop.
