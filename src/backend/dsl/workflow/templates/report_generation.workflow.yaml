name: report_generation
version: "1.0"
description: |
  Report Generation — schedule cron → fetch → aggregate → render → send.
  Template tags: reporting, scheduled, etl, render.
steps:
  - type: activity
    name: fetch_period_data
    args:
      period: yesterday
    timeout_s: 300
  - type: activity
    name: aggregate_metrics
    args:
      level: tenant
    timeout_s: 120
  - type: activity
    name: render_pdf
    args:
      template: monthly_summary
    timeout_s: 60
  - type: activity
    name: send_via_email
    args:
      recipients: ops_team
    timeout_s: 30
