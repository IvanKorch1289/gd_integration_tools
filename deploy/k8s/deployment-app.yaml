# K-OPS-2 (Sprint 17 W17): Deployment main FastAPI app.
#
# Сборка:
#   * 3 replicas (minAvailable=1 в PDB; HPA масштабирует 3→20);
#   * rollingUpdate maxSurge=1, maxUnavailable=0 (zero-downtime);
#   * resource requests/limits для k8s scheduler + cgroup constraints;
#   * readiness/liveness/startup probes через `/health/{ready,live}`;
#   * non-root securityContext + read-only root fs + capabilities drop.
#
# Pre-deploy: alembic Job `deploy/k8s/jobs/migration.yaml` через
# `service_completed_successfully` (Helm pre-install hook в S18).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gd-app
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "1.0.0"
    sprint: s17
    wave: k5-w2-k8s-manifests
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gd-integration-tools
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gd-integration-tools
        app.kubernetes.io/component: app
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gd-app
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: ${GD_IMAGE:-gd-integration-tools:latest}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gd-app-config
            - secretRef:
                name: gd-app-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ai-workspace
              mountPath: /var/lib/gd_integration_tools/ai_workspaces
            - name: cache
              mountPath: /var/cache/gd_integration_tools
          lifecycle:
            preStop:
              exec:
                # SIGTERM-graceful: дать TaskRegistry shutdown 15s
                # (terminationGracePeriodSeconds = 30s).
                command: ["sleep", "15"]
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: ai-workspace
          emptyDir:
            sizeLimit: 2Gi
        - name: cache
          emptyDir:
            sizeLimit: 512Mi
      affinity:
        podAntiAffinity:
          # Распределение реплик по разным нодам.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: gd-integration-tools
                    app.kubernetes.io/component: app
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gd-app
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: app
