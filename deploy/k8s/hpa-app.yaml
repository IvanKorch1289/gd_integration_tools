# K-OPS-2 (Sprint 17 W17): HPA для main app (CPU + memory based).
#
# Worker HPA — отдельно (`temporal-worker-hpa.yaml`, Sprint 12 K2 W2)
# с custom metric `temporal_task_queue_depth`.
#
# Для app: scale на основе CPU 70% + memory 80% utilization.
# Carryover S18: custom metric `http_request_rate` через PrometheusAdapter.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gd-app-hpa
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: app
    sprint: s17
    wave: k5-w2-k8s-manifests
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gd-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
