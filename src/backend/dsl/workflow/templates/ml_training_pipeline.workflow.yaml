name: ml_training_pipeline
version: "1.0"
description: |
  ML Training Pipeline — data prep → train → eval → register model with retry.
  Template tags: ml, training, model-registry, retry.
default_retry_policy:
  initial_interval_s: 2.0
  backoff_coefficient: 2.0
  maximum_interval_s: 60.0
  maximum_attempts: 3
steps:
  - type: activity
    name: prepare_dataset
    args:
      split_ratio: 0.8
    timeout_s: 300
  - type: activity
    name: train_model
    args:
      algorithm: lightgbm
    timeout_s: 3600
  - type: activity
    name: evaluate_metrics
    args:
      metric_set: classification_full
    timeout_s: 180
  - type: activity
    name: register_in_mlflow
    args:
      stage: staging
    timeout_s: 60
