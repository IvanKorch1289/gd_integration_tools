# R2 Blueprint: saga_with_compensation — distributed transaction with rollback.
#
# Wave [wave:s5/k3-w6-blueprints].
#
# Универсальный паттерн SAGA pattern:
#   * последовательность 3+ шагов (steps[]);
#   * каждому шагу соответствует compensate-action;
#   * при неудаче — выполняются compensate в обратном порядке.
#
# Шаблон параметризован — можно instance'ить под бизнес-сценарии (booking,
# payment, multi-leg transfer).

blueprint: saga_with_compensation
version: "1.0.0"
description: "SAGA distributed transaction with compensation."
tags: [saga, transaction, compensation, eip]

# ─── Параметры blueprint ──────────────────────────────────────────────
params:
  - name: route_id
    type: string
    required: true
    description: "Уникальный ID маршрута"
  - name: step_1_action
    type: string
    required: true
    description: "Action для шага 1 (e.g. 'inventory.reserve')"
  - name: step_1_compensate
    type: string
    required: true
    description: "Compensate action для шага 1 (e.g. 'inventory.release')"
  - name: step_2_action
    type: string
    required: true
  - name: step_2_compensate
    type: string
    required: true
  - name: step_3_action
    type: string
    required: true
  - name: step_3_compensate
    type: string
    required: true
  - name: timeout_seconds
    type: integer
    required: false
    description: "Таймаут на каждый шаг (default 30s)"

# ─── Route entry ──────────────────────────────────────────────────────
from:
  http:
    method: POST
    path: /api/v1/saga/${blueprint.route_id}

steps:
  # SAGA-обёртка с явными compensate-действиями
  - saga:
      timeout_seconds: ${blueprint.timeout_seconds}
      steps:
        - name: step_1
          action:
            dispatch_action:
              name: ${blueprint.step_1_action}
              mode: sync
              payload: ${body.input}
          compensate:
            dispatch_action:
              name: ${blueprint.step_1_compensate}
              mode: sync
              payload: ${properties.step_1_result}

        - name: step_2
          action:
            dispatch_action:
              name: ${blueprint.step_2_action}
              mode: sync
              payload: ${properties.step_1_result}
          compensate:
            dispatch_action:
              name: ${blueprint.step_2_compensate}
              mode: sync
              payload: ${properties.step_2_result}

        - name: step_3
          action:
            dispatch_action:
              name: ${blueprint.step_3_action}
              mode: sync
              payload: ${properties.step_2_result}
          compensate:
            dispatch_action:
              name: ${blueprint.step_3_compensate}
              mode: sync
              payload: ${properties.step_3_result}

  # Audit success
  - audit:
      event: "blueprint.saga.${blueprint.route_id}.completed"
      payload:
        steps_completed: 3

to:
  response:
    code: 200
    body:
      saga_id: ${meta.exchange_id}
      status: completed
      results:
        step_1: ${properties.step_1_result}
        step_2: ${properties.step_2_result}
        step_3: ${properties.step_3_result}
