apiVersion: v1
kind: ConfigMap
metadata:
  name: gd-app-config
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: config
data:
  APP_ENV: {{ .Values.app.env.APP_ENV | quote }}
  LOG_LEVEL: {{ .Values.app.env.LOG_LEVEL | quote }}
  LOG_FORMAT: {{ .Values.app.env.LOG_FORMAT | quote }}
  DB_HOST: {{ .Values.app.env.DB_HOST | quote }}
  DB_PORT: {{ .Values.app.env.DB_PORT | quote }}
  DB_NAME: {{ .Values.app.env.DB_NAME | quote }}
  REDIS_HOST: {{ .Values.app.env.REDIS_HOST | quote }}
  REDIS_PORT: {{ .Values.app.env.REDIS_PORT | quote }}
  TEMPORAL_HOST: {{ .Values.app.env.TEMPORAL_HOST | quote }}
  TEMPORAL_PORT: {{ .Values.app.env.TEMPORAL_PORT | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.app.env.TEMPORAL_NAMESPACE | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.app.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
  OTEL_SERVICE_NAME: {{ .Values.app.env.OTEL_SERVICE_NAME | quote }}
  VAULT_ADDR: {{ .Values.app.env.VAULT_ADDR | quote }}
  GRANIAN_WORKERS: {{ .Values.app.env.GRANIAN_WORKERS | quote }}
  GRANIAN_THREADS: {{ .Values.app.env.GRANIAN_THREADS | quote }}
  GRANIAN_HOST: {{ .Values.app.env.GRANIAN_HOST | quote }}
  GRANIAN_PORT: {{ .Values.app.env.GRANIAN_PORT | quote }}
  ROUTES_CAPABILITY_GATE_STRICT: {{ .Values.app.env.ROUTES_CAPABILITY_GATE_STRICT | quote }}
  CONFIG_VALIDATOR_ENABLED: {{ .Values.app.env.CONFIG_VALIDATOR_ENABLED | quote }}
