# GD Integration Tools — DSL YAML Schema
# Wave s19/k3-w4-lsp-server-finale
# $id: https://gd-integration-tools/schemas/gd_dsl.yaml
# JSON Schema draft-07

$schema: http://json-schema.org/draft-07/schema#
$id: https://gd-integration-tools/schemas/gd_dsl.yaml
title: GD DSL Route Specification
description: >
  JSON-Schema for *.dsl.yaml route definitions in gd_integration_tools.
  Covers top-level structure, `from` source, `steps[]` processor array,
  `to` terminal, and all known step type variants.
  Used by LSP completion + validation (tools/dsl_lsp/).

definitions:
  source_http:
    type: object
    required: [method, path]
    properties:
      method:
        type: string
        enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
      path:
        type: string
        description: URL path pattern (e.g. /api/v1/demo/health)

  source_base:
    type: object
    properties:
      http:
        $ref: "#/definitions/source_http"
      schedule:
        type: string
        description: Cron expression or interval (e.g. "300s", "0 * * * *")
      kafka:
        type: object
        properties:
          topic: { type: string }
          group: { type: string }
      rabbit:
        type: object
        properties:
          queue: { type: string }
      mqtt:
        type: object
        properties:
          topic: { type: string }
      email_imap:
        type: object
        properties:
          mailbox: { type: string }
          folder: { type: string }
      webhook:
        type: object
        properties:
          path: { type: string }
      cdc:
        type: object
        properties:
          source: { type: string }
          table: { type: string }

  step_proxy:
    type: object
    required: [proxy]
    properties:
      proxy:
        type: object
        required: [src, dst]
        properties:
          src: { type: string }
          dst: { type: string }
    additionalProperties: false

  step_redirect:
    type: object
    required: [redirect]
    properties:
      redirect:
        type: object
        required: [url]
        properties:
          url: { type: string }
          code: { type: integer, default: 302 }
    additionalProperties: false

  step_call_function:
    type: object
    required: [call_function]
    properties:
      call_function:
        type: object
        required: [ref]
        properties:
          ref: { type: string, description: "Function reference 'module:function'" }
          args: { type: object }
    additionalProperties: false

  step_dispatch_action:
    type: object
    required: [dispatch_action]
    properties:
      dispatch_action:
        type: object
        required: [name, mode]
        properties:
          name: { type: string }
          mode: { type: string, enum: [sync, async, bg, api, sse, ws] }
    additionalProperties: false

  step_transform:
    type: object
    required: [transform]
    properties:
      transform:
        type: object
        required: [set]
        properties:
          set: { type: object, description: "JMESPath/JSONata assignments" }
    additionalProperties: false

  step_choice:
    type: object
    required: [choice]
    properties:
      choice:
        type: object
        required: [when]
        properties:
          when:
            type: array
            items:
              type: object
              properties:
                condition: { type: string }
                steps: { type: array }
    additionalProperties: false

  step_parallel:
    type: object
    required: [parallel]
    properties:
      parallel:
        type: object
        required: [branches]
        properties:
          branches:
            type: array
            items:
              type: object
              properties:
                steps: { type: array }
    additionalProperties: false

  step_try_catch:
    type: object
    required: [try_catch]
    properties:
      try_catch:
        type: object
        required: [try, catch]
        properties:
          try: { type: object, properties: { steps: { type: array } } }
          catch: { type: object, properties: { steps: { type: array } } }
    additionalProperties: false

  step_saga:
    type: object
    required: [saga]
    properties:
      saga:
        type: object
        required: [steps, compensate]
        properties:
          steps: { type: array }
          compensate: { type: array }
    additionalProperties: false

  step_invoke_workflow:
    type: object
    required: [invoke_workflow]
    properties:
      invoke_workflow:
        type: object
        required: [workflow]
        properties:
          workflow: { type: string }
          args: { type: object }
    additionalProperties: false

  step_crud_create:
    type: object
    required: [crud_create]
    properties:
      crud_create:
        type: object
        required: [entity, body]
        properties:
          entity: { type: string }
          body: { type: object }
    additionalProperties: false

  step_crud_read:
    type: object
    required: [crud_read]
    properties:
      crud_read:
        type: object
        required: [entity]
        properties:
          entity: { type: string }
          filter: { type: object }
    additionalProperties: false

  step_crud_update:
    type: object
    required: [crud_update]
    properties:
      crud_update:
        type: object
        required: [entity, id, body]
        properties:
          entity: { type: string }
          id: { type: [string, integer] }
          body: { type: object }
    additionalProperties: false

  step_crud_delete:
    type: object
    required: [crud_delete]
    properties:
      crud_delete:
        type: object
        required: [entity, id]
        properties:
          entity: { type: string }
          id: { type: [string, integer] }
    additionalProperties: false

  step_publish_event:
    type: object
    required: [publish_event]
    properties:
      publish_event:
        type: object
        required: [topic, payload]
        properties:
          topic: { type: string }
          payload: { type: object }
    additionalProperties: false

  step_notify_cascade:
    type: object
    required: [notify_cascade]
    properties:
      notify_cascade:
        type: object
        required: [channel, to, template]
        properties:
          channel: { type: string, enum: [email, sms, telegram] }
          to: { type: string }
          template: { type: string }
    additionalProperties: false

  step_audit:
    type: object
    required: [audit]
    properties:
      audit:
        type: object
        required: [event]
        properties:
          event: { type: string }
          metadata: { type: object }
    additionalProperties: false

  step_validate_response:
    type: object
    required: [validate_response]
    properties:
      validate_response:
        type: object
        required: [schema]
        properties:
          schema: { type: string }
          on_error: { type: string, enum: [dlq, retry, fail, warn] }
    additionalProperties: false

  step_db_query_external:
    type: object
    required: [db_query_external]
    properties:
      db_query_external:
        type: object
        required: [query]
        properties:
          query: { type: string }
          params: { type: array }
    additionalProperties: false

  step_db_call_procedure:
    type: object
    required: [db_call_procedure]
    properties:
      db_call_procedure:
        type: object
        required: [procedure]
        properties:
          procedure: { type: string }
          params: { type: array }
    additionalProperties: false

  step_get_setting:
    type: object
    required: [get_setting]
    properties:
      get_setting:
        type: object
        required: [path, to]
        properties:
          path: { type: string }
          to: { type: string }
    additionalProperties: false

  step_sink_publish:
    type: object
    required: [sink_publish]
    properties:
      sink_publish:
        type: object
        required: [sink, content]
        properties:
          sink: { type: string }
          content: { type: object }
    additionalProperties: false

  step_validate_request:
    type: object
    required: [validate_request]
    properties:
      validate_request:
        type: object
        required: [schema]
        properties:
          schema:
            type: object
            properties:
              type: { type: string }
              properties: { type: object }
              required:
                type: array
                items: { type: string }
    additionalProperties: false

  step_any:
    type: object
    description: Catch-all for any known step type
    oneOf:
      - $ref: "#/definitions/step_proxy"
      - $ref: "#/definitions/step_redirect"
      - $ref: "#/definitions/step_call_function"
      - $ref: "#/definitions/step_dispatch_action"
      - $ref: "#/definitions/step_transform"
      - $ref: "#/definitions/step_choice"
      - $ref: "#/definitions/step_parallel"
      - $ref: "#/definitions/step_try_catch"
      - $ref: "#/definitions/step_saga"
      - $ref: "#/definitions/step_invoke_workflow"
      - $ref: "#/definitions/step_crud_create"
      - $ref: "#/definitions/step_crud_read"
      - $ref: "#/definitions/step_crud_update"
      - $ref: "#/definitions/step_crud_delete"
      - $ref: "#/definitions/step_publish_event"
      - $ref: "#/definitions/step_notify_cascade"
      - $ref: "#/definitions/step_audit"
      - $ref: "#/definitions/step_validate_response"
      - $ref: "#/definitions/step_db_query_external"
      - $ref: "#/definitions/step_db_call_procedure"
      - $ref: "#/definitions/step_get_setting"
      - $ref: "#/definitions/step_sink_publish"
      - $ref: "#/definitions/step_validate_request"

  terminal_response:
    type: object
    required: [response]
    properties:
      response:
        type: object
        properties:
          code: { type: integer }
          body: { type: object }
          headers: { type: object }

  on_error_action:
    type: object
    properties:
      dlq:
        type: object
        properties:
          queue: { type: string }
      retry:
        type: object
        properties:
          max_attempts: { type: integer }
          delay: { type: string }
      fail:
        type: object
      warn:
        type: object

type: object
required: [from, steps, to]
properties:
  from:
    $ref: "#/definitions/source_base"
    description: Source trigger for the route
  steps:
    type: array
    items:
      $ref: "#/definitions/step_any"
    description: Ordered list of step processors
  to:
    oneOf:
      - $ref: "#/definitions/terminal_response"
      - type: object
        properties:
          sink: { type: string }
          topic: { type: string }
  on_error:
    $ref: "#/definitions/on_error_action"
    description: Global error handler
  policy:
    type: object
    properties:
      idempotency:
        type: object
        properties:
          key: { type: string }
      rate_limit:
        type: object
        properties:
          rpm: { type: integer }
      circuit_breaker:
        type: object
        properties:
          threshold: { type: number }
  schedule:
    type: string
    description: Cron or interval for scheduled routes
  requires_core:
    type: string
    description: SemVer constraint for core version
  requires_plugins:
    type: array
    items:
      type: string
  capabilities:
    type: array
    items:
      type: string
    description: V11 capability requirements
  tenant_aware:
    type: boolean
    default: false
  feature_flag:
    type: string
    description: Feature flag name for default-OFF routes
  slo:
    type: object
    properties:
      latency_p95_ms: { type: integer }
      error_budget_pct: { type: number }
