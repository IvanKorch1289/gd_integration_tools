# route.toml (V11): manifest for route 'osint_agent'
name = "osint_agent"
version = "0.1.0"
requires_core = ">=22.0,<23"
capabilities = ["net.outbound", "ai.llm"]
tenant_aware = true
feature_flag = { enabled = true, gate = "osint_agent_enabled" }
slo = { p95_ms = 5000, timeout_ms = 30000 }
schedule = "never"

[transport]
default_timeout_s = 30.0

[feature_flags]
default = ["default"]
