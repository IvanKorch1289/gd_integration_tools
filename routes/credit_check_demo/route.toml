[route]
name = "credit_check_demo"
version = "0.1.0"
description = "PoC route — credit check с AI Agent DSL processors (S27 W3 PoC)"
requires_core = ">=27.0,<28.0"
tenant_aware = true

capabilities = [
  "net.inbound.http:/api/v1/credit/check",
  "ai.invoke",
  "ai.memory.read",
  "ai.memory.write",
  "pii.tokenize.reversible",
  "skill.invoke",
]

[route.slo]
p95_ms = 500
p99_ms = 1500
rps_target = 50

[route.feature_flag]
name = "ai_agent_dsl_enabled"
