name: scheduled_audit
version: "1.0"
description: |
  Scheduled Audit — daily cron → collect events → aggregate → report.
  Template tags: scheduled, audit, daily, compliance.
steps:
  - type: activity
    name: collect_audit_events
    args:
      period: yesterday
    timeout_s: 300
  - type: activity
    name: aggregate_by_category
    timeout_s: 120
  - type: activity
    name: detect_anomalies
    args:
      threshold_sigma: 3
    timeout_s: 60
  - type: activity
    name: publish_audit_report
    args:
      sinks: [s3, email]
    timeout_s: 60
