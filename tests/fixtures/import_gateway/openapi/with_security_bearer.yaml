openapi: 3.0.3
info:
  title: Secured API
  version: 2.0.0
servers:
  - url: https://api.example.com
paths:
  /me:
    get:
      operationId: getMe
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
