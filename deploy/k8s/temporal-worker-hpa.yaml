---
# Sprint 12 K2 W2 — HPA для Temporal worker pool через PrometheusAdapter.
#
# Использует custom metric ``temporal_task_queue_depth`` (Gauge),
# экспонированную :mod:`infrastructure.observability.prometheus_temporal_exporter`.
#
# Pre-requisites:
#   * Prometheus + PrometheusAdapter в кластере (с правилом для
#     temporal_task_queue_depth).
#   * Deployment ``temporal-worker`` (см. helm/temporal-worker/).

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: temporal-worker-hpa
  namespace: gd-integration
  labels:
    app: temporal-worker
    sprint: s12
    wave: s12-k2-w2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: temporal-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Pods
      pods:
        metric:
          name: temporal_task_queue_depth
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
