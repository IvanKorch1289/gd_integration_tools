# K-OPS-2 (Sprint 17 W17): Secret-template для gd-integration-tools.
#
# ⚠️ ЭТОТ ФАЙЛ — TEMPLATE. Production-секреты НЕ хранятся в git.
#
# Production deployment (carryover S18):
#   1. ExternalSecrets Operator + Vault provider — recommended approach.
#      Pull через `vault kv get -mount=kv prod/gd-integration` в Secret.
#   2. Sealed Secrets (bitnami-labs/sealed-secrets) — git-friendly альтернатива.
#   3. Manual `kubectl create secret generic gd-app-secrets --from-literal=...`
#      для dev/staging.
#
# Все имена ключей соответствуют ENV-переменным в `core/config/services/*.py`
# (см. `make config-schema` для актуального списка).
apiVersion: v1
kind: Secret
metadata:
  name: gd-app-secrets
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    # В production: externalsecrets.io/v1/ExternalSecret + Vault SecretStore.
    gd.integration/source: "vault:kv/prod/gd-integration"
type: Opaque
stringData:
  # ⚠️ Placeholder values — заменяются Vault/ExternalSecrets в production.
  DB_USER: "placeholder-set-via-vault"
  DB_PASSWORD: "placeholder-set-via-vault"
  REDIS_PASSWORD: "placeholder-set-via-vault"
  JWT_SECRET: "placeholder-32-char-minimum-via-vault"
  VAULT_TOKEN: "placeholder-via-vault-agent-injector"
  CH_PASSWORD: "placeholder-set-via-vault"
  BACKUP_S3_ACCESS_KEY: "placeholder-set-via-vault"
  BACKUP_S3_SECRET_KEY: "placeholder-set-via-vault"
