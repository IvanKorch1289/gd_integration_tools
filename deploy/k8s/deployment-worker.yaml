# K-OPS-2 (Sprint 17 W17): Deployment Temporal workflow worker.
#
# Worker pool отделён от main app для:
#   * независимого scaling (HPA `temporal-worker-hpa.yaml` уже есть);
#   * graceful drain (workflow task в process не прерывается);
#   * resource isolation (worker может потреблять CPU при long-running task).
#
# HPA уже описан в `temporal-worker-hpa.yaml` (Sprint 12 K2 W2).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: gd-integration
  labels:
    app: temporal-worker
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: workflow-worker
    sprint: s17
    wave: k5-w2-k8s-manifests
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    # RollingUpdate для worker — окей: Temporal sticky-queue + retry задачу не теряет.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: temporal-worker
      app.kubernetes.io/name: gd-integration-tools
      app.kubernetes.io/component: workflow-worker
  template:
    metadata:
      labels:
        app: temporal-worker
        app.kubernetes.io/name: gd-integration-tools
        app.kubernetes.io/component: workflow-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: gd-app
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Workflow-в-процессе может выполняться долго; даём 5 минут graceful.
      terminationGracePeriodSeconds: 300
      containers:
        - name: worker
          image: ${GD_IMAGE:-gd-integration-tools:latest}
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - src.backend.workflows.worker
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gd-app-config
            - secretRef:
                name: gd-app-secrets
          env:
            - name: GD_ROLE
              value: "workflow-worker"
            - name: TEMPORAL_TASK_QUEUE
              value: "gd-default"
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /probe/ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /probe/live
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ai-workspace
              mountPath: /var/lib/gd_integration_tools/ai_workspaces
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
        - name: ai-workspace
          emptyDir:
            sizeLimit: 4Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: gd-integration-tools
                    app.kubernetes.io/component: workflow-worker
                topologyKey: kubernetes.io/hostname
