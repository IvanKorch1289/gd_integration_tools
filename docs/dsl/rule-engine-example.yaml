# Пример ruleset rule-engine для DSL-шага .evaluate_rules / evaluate_rules.
# Wave: [wave:s8/k3-rule-engine-finale].
#
# Хранится в таблице rule_engine_rulesets (alembic e1f2a3b4c5d6) и
# подгружается через RuleEngineRegistry.get_active(name="credit_scoring").
#
# Use-case: кредитный скоринг — принимает {score, debt_ratio, age, income}
# и возвращает action: approve / decline / manual_review.

name: credit_scoring
version: "1"
rules:
  - id: high_risk_score
    condition: "score < 500 or debt_ratio > 0.7"
    action: decline
    reason: "Низкий скоринг или высокая долговая нагрузка"

  - id: insufficient_income
    condition: "income < 30000 and age < 25"
    action: decline
    reason: "Недостаточный доход для возрастной группы"

  - id: manual_review_band
    condition: "500 <= score < 700"
    action: manual_review
    reason: "Скоринг в band'е ручной проверки"

  - id: high_score_but_high_debt
    condition: "score >= 700 and debt_ratio > 0.5"
    action: manual_review
    reason: "Высокий скоринг + долговая нагрузка >50%"

default_action: approve
default_reason: "Заявка автоматически одобрена"
