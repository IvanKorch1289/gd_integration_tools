# S30 w5: Helm values for gd-integration-tools
# Full Helm chart: deploy/k8s/ raw YAML → Helm templated (S17 K-OPS-2 carryover)

namespace:
  name: gd-integration
  create: false

image:
  repository: ghcr.io/ivankorch1289/gd-integration-tools
  tag: "1.0.0"
  pullPolicy: IfNotPresent

app:
  name: gd-app
  replicas: 3
  revisionHistoryLimit: 5
  terminationGracePeriodSeconds: 30

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  probes:
    startupFailureThreshold: 30
    startupPeriodSeconds: 2
    readinessInitialDelay: 5
    readinessPeriodSeconds: 10
    readinessTimeout: 3
    readinessFailureThreshold: 3
    livenessInitialDelay: 30
    livenessPeriodSeconds: 30
    livenessTimeout: 5
    livenessFailureThreshold: 3

  serviceAccount:
    create: false
    name: gd-app

  env:
    APP_ENV: production
    LOG_LEVEL: INFO
    LOG_FORMAT: json
    DB_HOST: postgres.gd-integration.svc.cluster.local
    DB_PORT: "5432"
    DB_NAME: gd_integration_tools
    REDIS_HOST: redis.gd-integration.svc.cluster.local
    REDIS_PORT: "6379"
    TEMPORAL_HOST: temporal-frontend.gd-integration.svc.cluster.local
    TEMPORAL_PORT: "7233"
    TEMPORAL_NAMESPACE: gd-integration
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
    OTEL_SERVICE_NAME: gd-integration-tools
    VAULT_ADDR: https://vault.vault.svc.cluster.local:8200
    GRANIAN_WORKERS: "4"
    GRANIAN_THREADS: "2"
    GRANIAN_HOST: 0.0.0.0
    GRANIAN_PORT: "8000"
    ROUTES_CAPABILITY_GATE_STRICT: "false"
    CONFIG_VALIDATOR_ENABLED: "true"

worker:
  name: gd-worker
  replicas: 2
  revisionHistoryLimit: 3
  terminationGracePeriodSeconds: 300

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  env:
    APP_ENV: production
    LOG_LEVEL: INFO
    LOG_FORMAT: json
    DB_HOST: postgres.gd-integration.svc.cluster.local
    DB_PORT: "5432"
    DB_NAME: gd_integration_tools
    REDIS_HOST: redis.gd-integration.svc.cluster.local
    REDIS_PORT: "6379"
    TEMPORAL_HOST: temporal-frontend.gd-integration.svc.cluster.local
    TEMPORAL_PORT: "7233"
    TEMPORAL_NAMESPACE: gd-integration
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
    OTEL_SERVICE_NAME: gd-integration-tools
    VAULT_ADDR: https://vault.vault.svc.cluster.local:8200

ingress:
  enabled: true
  className: nginx
  host: gd-integration.example.com
  tls:
    enabled: true
    secretName: gd-ingress-tls

networkPolicy:
  enabled: true

pdb:
  enabled: true
  minAvailable: 1

hpa:
  app:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  worker:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetQueueDepth: 1000

migration:
  enabled: true
  image: ghcr.io/ivankorch1289/gd-integration-tools:latest
  dbName: gd_integration_tools
  timeout: 600

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfileType: RuntimeDefault
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilitiesDrop:
    - ALL
