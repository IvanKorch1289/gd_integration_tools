# Reference V11 plugin manifest (Wave R1.fin demo).
# Полное описание формата — docs/adr/ADR-042-plugin-toml-schema.md.
# Каталог capabilities — docs/adr/ADR-044-capability-vocabulary.md.

name = "example_plugin"
version = "1.0.0"
requires_core = ">=0.2,<0.3"
entry_class = "extensions.example_plugin.plugin.ExamplePlugin"
tenant_aware = false
description = "Reference V11 plugin (Wave R1.fin demo)"
# S18 W12 (ADR-NEW-6): internal trusted plugin → Tier-A (no runtime sandbox).
trust_tier = "A"

# ─── Runtime capabilities (sandbox gate) ──────────────────────────
[[capabilities]]
name = "mq.publish"
scope = "example.events.*"

# ─── Tenant-aware demo (Sprint 36 V15 GAP, Subagent C) ────────────
# Этот плагин — ``tenant_aware = false``, поэтому tenant scoping не применяется
# по умолчанию. Чтобы включить tenant-aware demo, установите ``tenant_aware = true``
# и зарегистрируйте capabilities для конкретных tenant'ов через
# :meth:`CapabilityGate.declare_tenant` (runtime), либо через admin-UI.
#
# Пример multi-tenant сценария:
#   gate.declare_tenant(
#       CapabilityRef(name="mq.publish", scope="example.events.*"),
#       tenant="tenant_a",
#       principal="example_plugin",
#   )
#   gate.check_tenant("mq.publish", "tenant_a", "example_plugin", "example.events.order_created") is True
#
# Для другого tenant'а тот же вызов вернёт ``False`` (если не задекларировано).
#
# ─── V15 GAP Gap 4 (Sprint 36, Subagent A): декларативный [[tenants]] ─
# Slice 1 поддерживает только имена capabilities в ``[[tenants]]`` (без
# ``scope`` — следующий slice). Пример формата (раскомментируйте
# блок ниже и установите ``tenant_aware = true`` для активации):
#
#   tenant_aware = true
#
#   [[tenants]]
#   name = "tenant_a"
#   capabilities = ["mq.publish", "db.read"]
#
#   [[tenants]]
#   name = "tenant_b"
#   capabilities = ["mq.publish"]
#
# После ``PluginLoaderV11._load_one`` плагин получит:
#   gate.check_tenant("mq.publish", "tenant_a", "example_plugin", None) is True
#   gate.check_tenant("db.read",    "tenant_b", "example_plugin", None) is False
#   gate.check_tenant("mq.publish", "tenant_c", "example_plugin", None) is False
#
# NB: scope=None в slice 1 → работает только для capabilities, у которых
# ``scope_required=False`` в vocabulary (например, mq.* / net.* / fs.* без
# обязательного scope). Для ``db.*`` / ``secrets.*`` используйте
# :meth:`CapabilityGate.declare_tenant` напрямую с явным scope.

# ─── DSL call_function whitelist (K-ARCH-5, S17) ──────────────────
# NOTE: call_function_modules was removed from manifest schema (ADR-042).
# In strict mode (ENVIRONMENT=production or call_function_whitelist_strict=True),
# plugins must declare call_function_modules inside each [[capabilities]] block.
# For now this example plugin uses the non-strict approach.

# ─── Декларативный inventory ──────────────────────────────────────
[provides]
actions = ["example.echo"]
