# S29 W4: ML Predict demo route
# Demonstrates ml_predict DSL step with local model from ${AI_WORKSPACE}/models/

from:
  http:
    method: POST
    path: /api/v1/ml/predict

steps:
  # ML-инференс через локальную модель
  - ml_predict:
      model: credit_scoring
      input_field: body.features
      output_property: ml_prediction

  # Fallback: если модель не найдена или инференс неуспешен — возвращаем ошибку
  - set_property:
      property: prediction_score
      source: ${ml_prediction}

to:
  response:
    code: 200
    body:
      model: credit_scoring
      prediction: ${prediction_score}