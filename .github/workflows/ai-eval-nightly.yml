name: ai-eval-nightly

# K4 Sprint 6 Wave 1: ночной запуск Inspect AI eval-suites.
# 5-7 reference suite (knowledge_qa, instruction_following, hallucination,
# safety_classifier, context_recall, tool_use, multi_turn_coherence).
# Артефакты складываются в artifacts/inspect-ai/<date>/{report.json,report.md}.

on:
  schedule:
    # Каждый день в 03:00 UTC (06:00 МСК).
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      suite_name:
        description: "Single suite name (empty = run all)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ai-eval-nightly
  cancel-in-progress: false

jobs:
  inspect-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FEATURE_INSPECT_AI_EVAL_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps (with AI extras)
        run: uv sync --extra ai

      - name: Run nightly eval (all suites)
        if: ${{ github.event.inputs.suite_name == '' }}
        run: uv run python manage.py ai-eval nightly --artifacts-dir artifacts/inspect-ai

      - name: Run single suite
        if: ${{ github.event.inputs.suite_name != '' }}
        run: uv run python manage.py ai-eval suite "${{ github.event.inputs.suite_name }}" --artifacts-dir artifacts/inspect-ai

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-ai-reports
          path: artifacts/inspect-ai/**
          retention-days: 14
          if-no-files-found: warn

      - name: Append job summary
        if: always()
        run: |
          if ls artifacts/inspect-ai/*/report.md 1>/dev/null 2>&1; then
            cat artifacts/inspect-ai/*/report.md >> "$GITHUB_STEP_SUMMARY"
          fi
