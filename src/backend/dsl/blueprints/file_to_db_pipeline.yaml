# R2 Blueprint: file_to_db_pipeline — CSV/JSON/Parquet → DB.
# Wave [wave:s10/k3-w1-blueprint-library-15].

blueprint: file_to_db_pipeline
version: "1.0.0"
description: "File-watcher → parse → validate → bulk INSERT в БД."
tags: [eip, etl, file, db]

params:
  - { name: route_id, type: string, required: true }
  - { name: input_glob, type: string, required: true }
  - { name: parser, type: string, required: true,
      description: "csv | json | parquet | xml" }
  - { name: target_table, type: string, required: true }
  - { name: validator, type: string, required: false }

from:
  file_watch:
    glob: ${blueprint.input_glob}
    poll_interval_ms: 5000

steps:
  - parse_file:
      format: "${blueprint.parser}"
      to: body.records
  - choice:
      when:
        - condition: "body.records | length == 0"
          steps:
            - audit:
                action: blueprint.file_to_db.empty
            - to:
                response:
                  code: 204
  - call_function:
      ref: "${blueprint.validator}"
      to: body.validated
  - crud_bulk_create:
      entity: "${blueprint.target_table}"
      body: "${body.validated}"
  - audit:
      action: blueprint.file_to_db.completed
      metadata_from:
        count: "body.validated | length"
