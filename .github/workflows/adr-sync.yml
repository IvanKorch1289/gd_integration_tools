# ADR Wiki sync — lightweight GitHub Action для ADR→wiki (Sprint 42 W3).
#
# Триггеры:
#   - push в master/main: changes в docs/adr/** или tools/build_adr_wiki.py
#   - workflow_dispatch: ручной запуск
#
# Шаги:
#   1. Checkout
#   2. Setup Python 3.14 + uv
#   3. Run tools/build_adr_wiki.py → регенерирует docs/adr/WIKI.md
#   4. Run tools/build_adr_index.py → регенерирует docs/adr/INDEX.md
#   5. Auto-commit (если есть изменения)
#
# Отличие от docs.yml:
#   - docs.yml = full Sphinx build (multi-version, slow, ~5 min)
#   - adr-sync.yml = только WIKI.md + INDEX.md (~5 sec)
# - ADR-only sync = быстрый feedback loop при правке ADR
# - docs.yml остаётся для full site publish (после PR merge в master)

name: adr-sync

on:
  push:
    branches: [main, master]
    paths:
      - "docs/adr/**"
      - "tools/build_adr_wiki.py"
      - "tools/build_adr_index.py"
      - ".github/workflows/adr-sync.yml"
  workflow_dispatch:

permissions:
  contents: write   # для auto-commit

concurrency:
  group: adr-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install minimal deps
        run: uv sync --frozen --no-dev

      - name: Build WIKI.md (chronological summary)
        run: uv run python tools/build_adr_wiki.py

      - name: Build INDEX.md (slot table)
        run: uv run python tools/build_adr_index.py

      - name: Show diff
        run: |
          git diff --stat docs/adr/WIKI.md docs/adr/INDEX.md
          echo "---"
          git diff docs/adr/WIKI.md docs/adr/INDEX.md | head -50

      - name: Auto-commit (если есть изменения)
        run: |
          if git diff --quiet docs/adr/WIKI.md docs/adr/INDEX.md; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/adr/WIKI.md docs/adr/INDEX.md
          git commit -m "docs(adr): auto-sync WIKI.md + INDEX.md via adr-sync.yml

          Sprint 42 W3 — lightweight ADR-only sync.
          See ADR-0114 (LSP) для related DX improvements.

          Auto-generated by .github/workflows/adr-sync.yml."
          git push
