# mlflow>=2.18,<3 декларирует pyarrow<20, но pyarrow в core зависит от
# >=20 (S10 миграция). API mlflow совместим с pyarrow>=20 — override
# принудительно поднимает constraint для разрешения ai-model-registry +
# core resolution path. Side-effect для других пакетов отсутствует —
# pyarrow в проекте уже >=20.
