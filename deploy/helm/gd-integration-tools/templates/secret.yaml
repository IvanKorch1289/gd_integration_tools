apiVersion: v1
kind: Secret
metadata:
  name: gd-app-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: secrets
type: Opaque
# NOTE: In production, use ExternalSecrets + Vault operator.
# This placeholder Secret is for development/staging only.
stringData:
  GD_DATABASE_URL: {{ printf "postgresql://gd_user:***@%s/%s" .Values.app.env.DB_HOST .Values.app.env.DB_NAME }}
  GD_REDIS_URL: {{ printf "redis://%s:%s/0" .Values.app.env.REDIS_HOST .Values.app.env.REDIS_PORT }}
  GD_TEMPORAL_URL: {{ printf "%s:%s" .Values.app.env.TEMPORAL_HOST .Values.app.env.TEMPORAL_PORT }}
  VAULT_TOKEN: CHANGEME
  # LLM API keys (optional, for cloud AI providers)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
