route_id: test_mf
source:
  http:
    method: POST
    path: /api/v1/CHANGEME
steps:
- call_function:
    ref: extensions.test_mf.normalizer:apply_rules
- policy:
    retry:
      attempts: 3
      backoff: exponential
      max_delay_ms: 5000
- llm_call:
    provider: claude
    model: claude-3-5-sonnet-20241022
    prompt_from: body.context
    result_property: ai_response
    dry_run_provider: mock-llm
- sink_publish:
    sink_kind: kafka
    topic: CHANGEME
- audit:
    action: test_mf.processed
- to:
    response:
      code: 200
      body: ${body}
