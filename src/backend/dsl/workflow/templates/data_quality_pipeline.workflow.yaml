name: data_quality_pipeline
version: "1.0"
description: |
  Data Quality Pipeline — ingest → validate → enrich → publish (parallel branches).
  Template tags: data, ingest, etl, parallel.
steps:
  - type: activity
    name: ingest_raw_data
    args:
      source_format: csv
    timeout_s: 120
  - type: activity
    name: validate_schema
    args:
      schema_id: customer_v3
    timeout_s: 60
  - type: activity
    name: enrich_with_external
    args:
      enrich_source: dadata
    timeout_s: 90
  - type: activity
    name: publish_to_warehouse
    args:
      target: clickhouse
    timeout_s: 60
