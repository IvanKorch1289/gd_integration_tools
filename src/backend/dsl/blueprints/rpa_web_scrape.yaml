# R2 Blueprint: rpa_web_scrape — Playwright-based web scrape + cleanup.
# Wave [wave:s10/k3-w1-blueprint-library-15].

blueprint: rpa_web_scrape
version: "1.0.0"
description: "Browser RPA: open URL → extract → cleanup."
tags: [rpa, scraping]

params:
  - { name: route_id, type: string, required: true }
  - { name: target_url, type: string, required: true }
  - { name: selectors, type: object, required: true }
  - { name: sink_kind, type: string, required: false, description: "kafka | db | log" }

from:
  cron: "0 */6 * * *"

steps:
  - browser_open:
      url: ${blueprint.target_url}
      headless: true
      timeout_ms: 30000
  - browser_extract:
      selectors: ${blueprint.selectors}
      to: body.extracted
  - browser_close: {}
  - sink_publish:
      sink_kind: ${blueprint.sink_kind}
      payload: ${body.extracted}
  - audit: { action: blueprint.rpa_web_scrape.completed }
