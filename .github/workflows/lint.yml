name: lint

# Sprint 3 W1 К5 / GAP-10: статический линт и архитектурные gates.
# Запускается на push в master и на pull_request.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          # TODO: при недоступности 3.14 в setup-python на GitHub-runners
          # временно использовать '3.14-dev' или fallback на '3.13'.
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Ruff check (lint)
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Compatibility gate (check_compat)
        # Sprint 60 W3 — фикс v25 CI gap: check_compat.py только в pre-commit,
        # CI его не запускал. Теперь блокирующий шаг в lint.yml.
        # Ловит: syntax errors (ast.parse), removed stdlib modules (imp, distutils,
        # asyncore, asynchat, collections.MutableMapping), deprecated typing (Text, io),
        # голые except: — ДО того как ruff начнёт анализ.
        run: uv run python tools/check_compat.py

      - name: Python compileall gate
        # Sprint 60 W3 — дополнительная защита: python -m compileall ловит
        # syntax errors которые ast.parse/check_compat могли пропустить
        # (например, dynamic exec, type comments).
        run: uv run python -m compileall -q src scripts tools

      - name: isort check (best-effort)
        # isort может отсутствовать в окружении — не блокировать PR при этом.
        run: |
          if uv run isort --version >/dev/null 2>&1; then
            uv run isort --check-only src tests
          else
            echo "isort не установлен — шаг пропущен"
          fi

      - name: Architectural layers gate (check_layers)
        # tools/check_layers.py лежит плоско в tools/, без подкаталога checks/.
        run: uv run python tools/check_layers.py

      - name: Docstring policy gate (check_docstrings)
        # S102 W2: убран --strict (без paths = exit 2 typer bug). Используем
        # default mode (diff vs allowlist) с путями из pre-commit hook.
        # TODO S102+ W3: убрать continue-on-error после full ratchet (S104+).
        continue-on-error: true
        run: uv run python tools/check_docstrings.py src/backend/core src/backend/dsl src/backend/dsl/engine src/backend/core/interfaces src/backend/services src/backend/entrypoints src/backend/infrastructure src/backend/ai

      - name: Temporal sandbox gate (S86 W4, V2 P0 #2)
        # S86: scan step_compilers для direct I/O в workflow-функциях.
        # Запрещено: gateway.invoke, .acompletion, .completion в workflow.
        # Разрешено: workflow.execute_activity, _agent_invoke_activity.
        run: uv run python tools/s86_workflow_sandbox_guard.py
