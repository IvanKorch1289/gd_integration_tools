name: chaos

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "src/backend/infrastructure/resilience/**"
      - "src/backend/core/resilience/**"
      - "tests/chaos/**"
      - ".github/workflows/chaos.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chaos-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.9.0
        ports:
          - 8474:8474
        options: --health-cmd "wget -q -O - http://localhost:8474/version || exit 1" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: chaos-docker-${{ runner.os }}-toxiproxy-2.9.0

      - name: Sync deps
        run: uv sync --extra dev-light --extra testkit

      - name: Run chaos suite
        env:
          TOXIPROXY_URL: http://localhost:8474
        run: |
          uv run pytest tests/chaos -q -m "chaos" \
            --junitxml=chaos-results.xml

      - name: Upload chaos results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: chaos-results
          path: chaos-results.xml
          retention-days: 14

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('chaos-results.xml')) return;
            const xml = fs.readFileSync('chaos-results.xml', 'utf8');
            const m = xml.match(/<testsuite[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*/);
            if (!m) return;
            const [, total, failures] = m;
            const ok = failures === '0';
            const body = [
              '## chaos × 33',
              ok ? `✅ ${total}/${total} passed` : `❌ ${failures}/${total} failed`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
