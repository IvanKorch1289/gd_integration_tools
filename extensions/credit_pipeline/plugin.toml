# V11 plugin manifest — extensions/credit_pipeline (SCAFFOLD)
# Sprint 7 Team T2: пустой scaffold для будущего Team T3 (1-й клиент СКБ/НБКИ).
#
# Формат: ADR-042 (plugin.toml schema), ADR-044 (capability vocabulary).
#
# TODO Team T3 (Sprint 8+):
#   * SKB client → services/clients/skb.py;
#   * НБКИ/CBR/Spark client → services/clients/<provider>.py;
#   * normalize.py → functions/normalize.py;
#   * credit_assessment.workflow.yaml → workflows/;
#   * route.toml + *.dsl.yaml → routes/<route_name>/;
#   * domain/models.py (Pydantic-модели CreditApplication, BkiReport, ...);
#   * actions/ + processors/ + frontend/pages/ при необходимости.

name = "credit_pipeline"
version = "0.1.0"
requires_core = ">=0.2,<0.3"
entry_class = "extensions.credit_pipeline.plugin.CreditPipelinePlugin"
tenant_aware = true
description = "Credit pipeline plugin (S76 — real agents: score/parse/decide)"
# S18 W12 (ADR-NEW-6): internal banking-critical plugin → Tier-A.
trust_tier = "A"

# ─── Runtime capabilities (capability-gate) ───────────────────────
# net.outbound — GlobScopeMatcher по '.' (DNS-стиль); :external требует WAF.
[[capabilities]]
name = "net.outbound"
scope = "*.skb-techno.ru"

[[capabilities]]
name = "net.outbound"
scope = "*.nbki.ru"

# db.read/db.write — ExactAliasMatcher: scope = имя домена ресурса.
[[capabilities]]
name = "db.read"
scope = "credit_applications"

[[capabilities]]
name = "db.write"
scope = "credit_applications"

[[capabilities]]
name = "db.read"
scope = "credit_reports"

[[capabilities]]
name = "db.write"
scope = "credit_reports"

# mq.publish — GlobScopeMatcher: события кредитного процесса.
[[capabilities]]
name = "mq.publish"
scope = "credit.events.*"

# ─── Декларативный inventory ──────────────────────────────────────
# S76 W2: 3 real actions (scoring, document_parser, decision agents).
[provides]
actions = [
    "credit_pipeline.score",
    "credit_pipeline.parse",
    "credit_pipeline.decide",
]
repositories = []
processors = []
sources = []
sinks = []
schemas = []
