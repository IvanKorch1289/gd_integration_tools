# R2 Blueprint: request_reply_async — sync HTTP → async обработка → callback.
# Wave [wave:s10/k3-w1-blueprint-library-15].
#
# Принимает HTTP-запрос, кладёт его в очередь, возвращает invocation_id;
# результат уходит через webhook/SSE/email callback.

blueprint: request_reply_async
version: "1.0.0"
description: "Async request-reply: invocation_id → callback по готовности."
tags: [eip, async, queue]

params:
  - { name: route_id, type: string, required: true }
  - { name: queue, type: string, required: true }
  - { name: callback_url_field, type: string, required: false }

from:
  http:
    method: POST
    path: /api/v1/${blueprint.route_id}/start

steps:
  - get_setting: { path: app.base_url, to: body.base_url }
  - sink_publish:
      sink_kind: kafka
      topic: ${blueprint.queue}
      payload: ${body}
  - audit: { action: blueprint.request_reply_async.queued }

to:
  response:
    code: 202
    body:
      status: queued
      invocation_id: ${exchange.correlation_id}
      callback_url: ${body.callback_url}
