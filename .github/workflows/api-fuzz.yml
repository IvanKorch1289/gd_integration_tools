name: api-fuzz

# Sprint 6 K2 — schemathesis API fuzzing gate.
# Warn-only (continue-on-error: true) до Sprint 7 / стабилизации.
# Активируется через feature_flag schemathesis_gate_enabled (default-OFF).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-fuzz:
    name: Schemathesis API fuzzing (warn-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps (with dev)
        run: uv sync --extra dev

      - name: Validate api_fuzz_runner.py imports
        run: uv run python -c "import tools.api_fuzz_runner as m; print('module loaded')"

      - name: Run api-fuzz (smoke — без backend)
        # В CI без backend schemathesis не сможет подключиться;
        # тест подтверждает CLI работоспособность.
        env:
          FEATURE_SCHEMATHESIS_GATE_ENABLED: "false"
        run: |
          mkdir -p dist
          uv run python tools/api_fuzz_runner.py \
            --openapi http://127.0.0.1:8000/openapi.json \
            --max-examples 5 \
            --workers 1 \
            --report dist/schemathesis-report.json \
          || echo "[api-fuzz] warn: backend недоступен в CI (ожидаемо для smoke)"

      - name: Upload schemathesis report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: schemathesis-report
          path: dist/schemathesis-report.json
          retention-days: 14
          if-no-files-found: ignore
