name: AI PR Review
"on":
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - src/**/*.py
    - tests/**/*.py
    - manage.py
    - pyproject.toml
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: false
        type: string
concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
env:
  CLAUDE_CODE_URL: http://127.0.0.1:12334
  MODEL: claude-haiku
  MAX_TOKENS: 1024

jobs:
  pre-checks:
    runs-on: ubuntu-latest
    outputs:
      files_changed: ${{ steps.changes.outputs.files }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: "0"
    - id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: "files:\n  - \"src/**/*.py\"\n  - \"tests/**/*.py\"\n  - \"manage.py\"\n  - \"pyproject.toml\""

  review:
    needs: pre-checks
    if: needs.pre-checks.outputs.files_changed != ""
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: "0"
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
    - name: Sync deps
      run: uv sync

    - name: AI Layer Policy Check
      id: layer-policy
      run: |
        uv run python -c "
        import os, json, subprocess

        result = subprocess.run(['git', 'diff', '--name-only', 'HEAD~1'], capture_output=True, text=True)
        changed_files = [f.strip() for f in result.stdout.strip().split('\n') if f.strip()]

        violations = []
        for f in changed_files:
            if f.startswith('src/backend/infrastructure/'):
                result = subprocess.run(['grep', '-n', 'from src.backend.services', f], capture_output=True, text=True)
                if result.returncode == 0:
                    for line in result.stdout.strip().split('\n'):
                        violations.append(f'{f}:{line}')

        if violations:
            print('LAYER_POLICY_VIOLATIONS=' + json.dumps(violations))
            print('::error::Layer policy violation: infrastructure cannot import from services')
            exit(1)
        print('LAYER_POLICY=OK')
        "
      continue-on-error: true

    - name: Run security scan
      id: security
      run: |
        uv run bandit -r src/ -f json -o bandit_report.json || true

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit_report.json
        retention-days: 7

    - name: Check coverage delta
      id: coverage
      run: |
        uv run pytest tests/ --cov=. --cov-report=json:coverage.json -q || true

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.json
        retention-days: 7

    - name: Check perf baseline
      id: perf
      run: |
        if [ -f .benchmarks/baseline.json ]; then
          echo "BASELINE_EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "BASELINE_EXISTS=false" >> $GITHUB_OUTPUT
        fi

    - name: Run perf check if baseline exists
      if: steps.perf.outputs.BASELINE_EXISTS == 'true'
      run: |
        uv run python tools/perf_gate.py --check || true

    - name: AI Review Summary
      id: ai-review
      run: |
        uv run python .github/workflows/ai_review_script.py
      env:
        PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number || 'N/A' }}
        REPO: ${{ github.repository }}
        AUTHOR: ${{ github.event.pull_request.user.login || 'workflow_dispatch' }}
        LAYER_POLICY: ${{ steps.layer-policy.outputs.LAYER_POLICY || 'Checked' }}

    - name: Post Review Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const content = process.env.AI_REVIEW || 'AI review unavailable';
          const comment = `## AI PR Review Summary\n\n${content}\n\n---\n*AI-generated review via Claude Code API*\n`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-review-artifacts
        path: |
          bandit_report.json
          coverage.json
        retention-days: 7
