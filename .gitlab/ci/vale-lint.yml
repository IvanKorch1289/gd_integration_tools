# GitLab CI job for Vale prose linting
# S34 W5: Vale prose linter + ru-language proofreader

vale_docs:
  stage: lint
  image: python:3.14-slim
  allow_failure: true  # Allow failures for suggestions
  script:
    - pip install vale
    - vale --config=.vale.ini docs/ PLAN.md ARCHITECTURE.md
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
