# Shared audit and transform steps for composition demo
# This file is included via `include:` in main route

route_id: shared.audit.steps
steps:
  - audit:
      action: "route.composition_demo.start"
  - set_property:
      key: "body._meta.composition"
      value: "included"
  - set_property:
      key: "body._meta.ts"
      value: "${timestamp()}"