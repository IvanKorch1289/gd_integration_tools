route_id: hello_route
source:
  http:
    method: POST
    path: /api/v1/CHANGEME
steps:
- call_function:
    ref: extensions.hello_route.normalizer:apply_rules
- policy:
    retry:
      attempts: 3
      backoff: exponential
      max_delay_ms: 5000
- llm_call:
    provider: claude
    model: claude-3-5-sonnet-20241022
    prompt_from: body.context
    result_property: ai_response
    dry_run_provider: mock-llm
- http_call:
    url: https://api.test/sink
    method: POST
- audit:
    action: hello_route.processed
- to:
    response:
      code: 200
      body: ${body}
