# R2 Blueprint: fan_out_fan_in — параллельные ветки → агрегация ответов.
# Wave [wave:s10/k3-w1-blueprint-library-15].
#
# Полезен для:
#   * параллельных запросов в несколько внешних API с агрегацией;
#   * сравнения двух версий процесса (shadow execution);
#   * fan-out на N процессоров с retry-per-branch.

blueprint: fan_out_fan_in
version: "1.0.0"
description: "Параллельный fan-out → ожидание всех веток → агрегат."
tags: [eip, parallel, aggregate]

params:
  - { name: route_id, type: string, required: true }
  - { name: branches, type: array, required: true }
  - { name: aggregator, type: string, required: true,
      description: "Функция-агрегатор: extensions.<x>:aggregate" }
  - { name: timeout_ms, type: number, required: false }

from:
  http:
    method: POST
    path: /api/v1/${blueprint.route_id}/fan

steps:
  - parallel:
      branches: ${blueprint.branches}
      timeout_ms: ${blueprint.timeout_ms}
      on_partial_failure: continue
  - call_function:
      ref: ${blueprint.aggregator}
      to: body.aggregate
  - audit:
      action: blueprint.fan_out_fan_in.completed

to:
  response:
    code: 200
    body: "${body.aggregate}"
