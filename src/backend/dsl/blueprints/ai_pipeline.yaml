# R2 Blueprint: ai_pipeline — input → preprocess → llm → validate → output.
#
# Wave [wave:s5/k3-w6-blueprints].
#
# Универсальный паттерн для AI-orchestration:
#   * input ingestion (REST POST с JSON-payload);
#   * preprocess (sanitize PII + normalize);
#   * LLM call (через LiteLLM gateway);
#   * structured output validation (Pydantic);
#   * downstream notification.
#
# Шаблон параметризован через ${blueprint.*}.

blueprint: ai_pipeline
version: "1.0.0"
description: "AI orchestration: input → preprocess → LLM → validate → output."
tags: [ai, llm, pipeline, validation]

# ─── Параметры blueprint ──────────────────────────────────────────────
params:
  - name: route_id
    type: string
    required: true
    description: "Уникальный ID маршрута"
  - name: llm_model
    type: string
    required: true
    description: "Имя модели LLM (gpt-4o, claude-opus-4-7, llama-3 и т.д.)"
  - name: llm_provider
    type: string
    required: false
    description: "openai | anthropic | local | litellm"
  - name: prompt_template_setting
    type: string
    required: true
    description: "Путь до prompt-шаблона в settings (prompts.<name>)"
  - name: output_schema
    type: string
    required: true
    description: "Pydantic-модель для structured output validation"
  - name: cost_budget_usd
    type: number
    required: false
    description: "Maximum cost per request (USD)"

# ─── Route entry ──────────────────────────────────────────────────────
from:
  http:
    method: POST
    path: /api/v1/ai/${blueprint.route_id}

steps:
  # 1. Validate request schema
  - validate_request:
      schema:
        type: object
        properties:
          input: { type: object }
        required: [input]

  # 2. PII sanitize (если plugin presidio активен)
  - sanitize_pii:
      target: body.input

  # 3. Normalize input (lowercase keys, strip whitespace)
  - transform:
      set:
        body.normalized: ${body.input}

  # 4. Получить prompt template из settings
  - get_setting:
      path: ${blueprint.prompt_template_setting}
      to: body.prompt_template

  # 5. Compose prompt (через PromptComposerProcessor)
  - prompt_composer:
      template: ${body.prompt_template}
      variables: ${body.normalized}
      to: body.composed_prompt

  # 6. LLM call (через LiteLLM gateway)
  - llm_call:
      model: ${blueprint.llm_model}
      provider: ${blueprint.llm_provider}
      prompt: ${body.composed_prompt}
      cost_budget_usd: ${blueprint.cost_budget_usd}
      to: body.llm_response

  # 7. Parse JSON output
  - llm_parser:
      input: ${body.llm_response}
      output_format: json
      to: body.parsed

  # 8. Pydantic validation structured output
  - validate_response:
      schema: ${blueprint.output_schema}
      on_error: dlq

  # 9. Restore PII (vault-key)
  - restore_pii:
      target: body.parsed

  # 10. Audit (включая cost-tracker)
  - cost_tracker:
      track: ${body.llm_response.usage}
  - audit:
      event: "blueprint.ai_pipeline.${blueprint.route_id}.completed"

to:
  response:
    code: 200
    body:
      result: ${body.parsed}
      model: ${blueprint.llm_model}
