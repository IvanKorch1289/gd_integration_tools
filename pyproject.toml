[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version"
]
branch = "main"
upload_to_pypi = false
upload_to_release = false
commit_author = "Korch Ivan <cards25kk.bank>"


[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
# S11 carryover [wave:s10-carryover/test-collection-errors]:
# `--import-mode=importlib` избегает namespace-collisions между
# одноимёнными каталогами (tests/cache vs tests/unit/cache,
# tests/security vs tests/unit/security, tests/unit/api vs
# tests/integration/api).
# См. https://docs.pytest.org/en/stable/explanation/pythonpath.html
addopts = "-ra --strict-markers --import-mode=importlib"
markers = [
    "requires_pg: integration tests requiring real PostgreSQL via testcontainers",
    "chaos: chaos-tests against resilience chains (Docker required, see Wave K5/chaos)",
    "slow: slow tests, skipped by default in unit-suite",
    "requires_toxiproxy: requires toxiproxy container",
    "unit: fast unit tests",
]


[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
# [wave:s19/k2-w4-coverage-ratchet-75] Sprint 16 DoD-10 (V22): coverage gate ≥75% (раскат 50→83% per PLAN.md).
# S19 K2 W4 ratchet: 70% → 75%.
# S34 W4: 75% → 60% как реалистичная промежуточная цель. Достижение 90% требует
# ~26000 дополнительных covered statements и нереально за один спринт.
# Текущий baseline пересчитывается через `pytest --cov=src --cov-report=xml`
# + `python tools/coverage/breakdown_by_layer.py coverage.xml` (per-layer split).
fail_under = 75
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:"
]

[tool.vulture]
# vulture: gate dead-code analyzer (R3.0 финал).
# Конфиг закрывает три класса false-positive:
#   1. Protocol/abstract API params — имена сохраняются как часть контракта;
#   2. CDC scaffold (R2.1) — реальная имплементация в R3.4, до тех пор unreachable
#      branches ожидаемы; путь исключается до закрытия R3.4.
#   3. gRPC autogen — сгенерированные protobuf-модули.
paths = ["src/backend", "src/frontend"]
min_confidence = 80
exclude = [
    "src/backend/entrypoints/grpc/protobuf/auto/",
    # TODO(R3.4): убрать после реализации CDC backends
    "src/backend/infrastructure/cdc/",
]
ignore_names = [
    # Protocol/abstract API contract params — намеренно объявлены без использования
    "expires_in",
    "escalate",
    "saga_id",
    "raw_context",
    "type_hint",
    # AI evaluator placeholders (Protocol-сигнатуры будущих evaluator'ов)
    "hallucination",
    "relevance",
    "toxicity",
    # DSL templates — параметр используется через kwarg call в default registry
    "target_table",
]

# -----------------------------------------------------------------------------
# Mutation testing (S39 W4 — branch coverage 38% → 55% via mutation analysis)
# -----------------------------------------------------------------------------
# Mutmut 2.4.4: вводит точечные мутации (operator/constant/name/boundary) в
# paths_to_mutate и прогоняет тесты из tests_dir. Mutation score = (killed /
# total). Цель: довести score до 55% — это соответствует real-mutation-based
# branch coverage, а не поверхностной line coverage.
#
# Конфиг intentionally ограничивает 3 hot-модулями (FeatureFlags, RouteBuilder,
# CircuitBreaker), чтобы цикл прогона укладывался в <5 минут. Расширять
# paths_to_mutate инкрементально — по модулю за раз.
#
# Mutmut 2.4.4 API notes (см. .venv/lib/python3.13/site-packages/mutmut/__init__.py:config_from_file):
#   - читает ТОЛЬКО ключи, совпадающие с click-опциями run-сабкоманды;
#   - dict_synonyms и tests_dir ожидаются СТРОКАМИ (split по ',' или ':');
#   - минимальный score / timeout / max_concurrent_spawns — не читаются из
#     конфига; их выставляет scripts/run_mutation_tests.sh через CLI/env.
#   - .coverage файл жёстко зашит; используем общий .coverage + --use-coverage.
[tool.mutmut]
paths_to_mutate = [
    "src/backend/core/config/features/__init__.py",
    "src/backend/dsl/builders/base.py",
    "src/backend/core/resilience/breaker.py",
]
backup = false
runner = "pytest"
# mutmut split_paths() делит по ',' или ':' — передаём одной строкой.
tests_dir = "tests/unit/core/config:tests/unit/dsl/builders:tests/unit/core/resilience"
# dict_synonyms — comma-separated string, по дефолту пусто (мутируем dict.get
# штатно, см. MUTATION_OPERATORS в mutmut/__init__.py).
dict_synonyms = ""
# paths-to-exclude — glob-паттерны, не мутировать (см. .mutmut-ignore для
# полного списка, здесь — критичные stub'ы, которые всегда бесполезно
# мутировать).
paths_to_exclude = "**/conftest.py:**/__init__.py:**/_compat.py"
# --use-coverage включён по умолчанию через wrapper-скрипт (CI-режим).
# Минимальный score 55% enforced в scripts/run_mutation_tests.sh через awk,
# т.к. mutmut 2.4.4 не имеет нативного gate'а (exit code 1 при failed mutants).
