# Pre-commit hooks для gd_integration_tools.
#
# Установка: `pip install pre-commit && pre-commit install`.
# Запуск вручную на всех файлах: `pre-commit run --all-files`.
#
# Хуки блокируют коммит при ошибках lint, проблемах форматирования или
# утечках секретов. Проверки идут только по изменённым файлам — коммиты быстрые.

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.0, types-PyYAML, types-redis]
        args: [--ignore-missing-imports, --no-strict-optional]
        pass_filenames: false
        entry: mypy src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: poetry\.lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements
