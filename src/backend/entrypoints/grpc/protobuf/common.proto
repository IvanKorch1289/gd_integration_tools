syntax = "proto3";

package common;

message Empty {}

message IdRequest {
  int32 id = 1;
}

message StringIdRequest {
  string id = 1;
}

message KeyValueRequest {
  string key = 1;
  int32 value = 2;
}

message StatusResponse {
  bool success = 1;
  string status = 2;
  string error = 3;
}

message JsonPayload {
  string action = 1;
  string json_data = 2;
}

message JsonResponse {
  bool success = 1;
  string json_data = 2;
  string error = 3;
}
