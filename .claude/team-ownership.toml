# team-ownership.toml — карта владения файлами Sprint 2 (V15.3 MVP)
#
# Версия: 2026-05-13
# Источник: 10-team plan (PLAN.md V18.1 Sprint 2 + день 1-2 kickoff)
#
# Назначение:
#   - каждая команда имеет «owned dirs» — единственный owner для PR-review;
#   - при смежной правке (файл в зоне 2+ команд) — issue + PR review от обоих;
#   - pre-commit hook tools/checks/check_team_ownership.py валидирует
#     git diff против списка (опционально, blocking только при flag --strict).
#
# Формат:
#   [team.<id>]
#   name = "..."
#   git_branch_prefix = "team/NN-..."
#   worktree = ".claude/worktrees/team-NN-..."
#   owned_paths = ["...", ...]    # glob-патерны от корня репозитория
#   shared_with = ["..."]         # команды-совладельцы (требуют co-review)

[meta]
version = "2026-05-13"
sprint = "S2"
source = "PLAN.md V18.1 10-team MVP nарезка"

# ─────────────────────────────────────────────────────────────────────────────
# K1 — Auth & Identity
# ─────────────────────────────────────────────────────────────────────────────
[team.k1]
name = "Auth & Identity"
git_branch_prefix = "team/01-auth"
worktree = ".claude/worktrees/team-01-auth"
goal = "Auth-стек R1 (JWT/API-key/mTLS) + R2 SAML/AD scaffold; 100% non-public endpoints под auth-guard."
owned_paths = [
    "src/backend/core/auth/**",
    "src/backend/core/security/**",
    "src/backend/infrastructure/secrets/**",
    "src/backend/entrypoints/middlewares/auth*",
    "tools/checks/check_auth_coverage.py",
]
shared_with = []

