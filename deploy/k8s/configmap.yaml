# K-OPS-2 (Sprint 17 W17): ConfigMap для non-secret конфигурации app/worker.
#
# Реальные значения определяются profile (dev/staging/prod) через
# Helm values.yaml (carryover S18 K5 W4 Helm chart).
# Секреты — отдельный Secret (см. secret.yaml / Vault ExternalSecrets).
apiVersion: v1
kind: ConfigMap
metadata:
  name: gd-app-config
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: config
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  # Database
  DB_HOST: "postgres.gd-integration.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "gd_integration_tools"
  # Redis
  REDIS_HOST: "redis.gd-integration.svc.cluster.local"
  REDIS_PORT: "6379"
  # Temporal
  TEMPORAL_HOST: "temporal-frontend.gd-integration.svc.cluster.local"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "gd-integration"
  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "gd-integration-tools"
  # Vault
  VAULT_ADDR: "https://vault.vault.svc.cluster.local:8200"
  # Granian ASGI
  GRANIAN_WORKERS: "4"
  GRANIAN_THREADS: "2"
  GRANIAN_HOST: "0.0.0.0"
  GRANIAN_PORT: "8000"
  # Feature-flags (default OFF) — runtime overrides через Redis pub/sub (D9 carryover).
  ROUTES_CAPABILITY_GATE_STRICT: "false"
  CONFIG_VALIDATOR_ENABLED: "true"
