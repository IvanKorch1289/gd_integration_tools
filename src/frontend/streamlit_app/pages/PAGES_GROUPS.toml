[notes]
# Streamlit page URLs определяются именем файла (без префикса).
# bookmark'и используют URL, не имя файла.
# _redirects.toml обрабатывает старые URL при renumber.
# Duplicate prefix collision: 40_dsl_visual_editor.py и 40_Schema_Viewer.py
# — оба имеют prefix 40, но разные имена → разные URL.
