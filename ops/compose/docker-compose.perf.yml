# Sprint 6 K2 — perf-suite docker-compose.
#
# Назначение:
#   Изолированный стек для нагрузочных тестов (k6 / locust) с
#   reference инфраструктурой: Granian + PostgreSQL + Redis + Temporal.
#
# Запуск:
#   docker compose -f docker-compose.perf.yml up -d
#   k6 run -e BASE_URL=http://127.0.0.1:8000 tests/perf/k6_baseline.js
#   docker compose -f docker-compose.perf.yml down -v
#
# Использовать через make:
#   make perf-suite-up    # подъём стека
#   make perf-suite-down  # остановка
#
# Feature-flag: ``perf_gate_strict`` (default-OFF) — CI workflow не блокирует
# нарушения SLO. Включить в default-ON отдельным PR после baseline стабилизации.

version: '3.9'

x-app-env: &app-env
  ENV_PROFILE: dev_light
  APP_SERVER: granian
  APP_WORKERS: ${APP_WORKERS:-4}
  GRANIAN_LOOP: uvloop
  GRANIAN_BLOCKING_THREADS: auto
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: gd_perf
  DB_USERNAME: gd_perf
  DB_PASSWORD: gd_perf_password
  REDIS_HOST: redis
  REDIS_PORT: 6379
  TEMPORAL_HOST: temporal
  TEMPORAL_PORT: 7233
  FEATURE_PERF_GATE_STRICT: 'false'
  FEATURE_GRANIAN_RSGI_MODE_ENABLED: 'true'

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gd_perf
      POSTGRES_USER: gd_perf
      POSTGRES_PASSWORD: gd_perf_password
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "gd_perf", "-d", "gd_perf"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:5435:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6382:6379"

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgres12
      POSTGRES_USER: gd_perf
      POSTGRES_PWD: gd_perf_password
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:7236:7233"

  backend:
    build:
      context: ../..
      dockerfile: ops/compose/Dockerfile
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:8000:8000"

  k6:
    image: grafana/k6:0.50.0
    environment:
      BASE_URL: http://backend:8000
      MODE: ${K6_MODE:-sustained}
    volumes:
      - ../../tests/perf:/scripts:ro
      - ../../dist:/dist
    command: run -e BASE_URL=http://backend:8000 -e MODE=${K6_MODE:-sustained}
             --summary-export=/dist/k6-summary.json
             /scripts/k6_baseline.js
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - load

  locust:
    image: locustio/locust:2.29.0
    environment:
      LOCUST_HOST: http://backend:8000
    volumes:
      - ../../tests/perf:/mnt/locust:ro
      - ../../dist:/dist
    command: -f /mnt/locust/locust_baseline.py
             --headless --users 200 --spawn-rate 50 --run-time 90s
             --csv=/dist/locust --csv-full-history
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - load
