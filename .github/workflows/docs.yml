name: docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache Sphinx doctrees
        uses: actions/cache@v4
        with:
          path: docs/build/.doctrees
          key: docs-${{ runner.os }}-${{ hashFiles('docs/**/*.md', 'src/**/*.py', 'docs/conf.py') }}
          restore-keys: |
            docs-${{ runner.os }}-

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Build ADR INDEX
        run: uv run python tools/build_adr_index.py

      - name: Sphinx build (-W blocks warnings)
        run: |
          mkdir -p docs/build
          uv run sphinx-build -b html -W --keep-going \
              -d docs/build/.doctrees docs docs/build/html

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build/html
          retention-days: 14

      - name: Docs coverage check
        run: uv run python tools/docs_coverage.py --strict
