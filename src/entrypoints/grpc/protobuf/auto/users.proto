syntax = "proto3";

package users.auto;

import "google/protobuf/any.proto";

// Схема для ввода данных пользователя.
message UserSchemaIn {
  string username = 1;
  google.protobuf.Any password = 2;  // unsupported <class 'pydantic.types.SecretStr'>
}

// Схема для вывода данных пользователя.
message UserSchemaOut {
  int64 id = 1;
  string username = 2;
  optional google.protobuf.Any email = 3;  // unsupported <class 'pydantic.networks.EmailStr'>
  google.protobuf.Any created_at = 4;  // unsupported <class 'datetime.datetime'>
  optional google.protobuf.Any updated_at = 5;  // unsupported <class 'datetime.datetime'>
  bool is_superuser = 6;
  bool is_active = 7;
}

// Пустое response (action без response_model).
message EmptyResponse {
}

// Пустое request (action без request_model).
message EmptyRequest {
}

// Авто-сгенерированный сервис для домена 'users' (Wave 1.3 Roadmap V10).
service UsersAutoService {
  // Создаёт новый объект ресурса 'users'.
  rpc Create(UserSchemaIn) returns (UserSchemaOut);
  // Создаёт несколько объектов ресурса 'users'.
  rpc CreateMany(UserSchemaIn) returns (EmptyResponse);
  // Возвращает объект ресурса 'users' по идентификатору.
  rpc Get(EmptyRequest) returns (UserSchemaOut);
  // Возвращает список объектов ресурса 'users'.
  rpc List(EmptyRequest) returns (UserSchemaOut);
  // Обновляет объект ресурса 'users'.
  rpc Update(UserSchemaIn) returns (UserSchemaOut);
}
