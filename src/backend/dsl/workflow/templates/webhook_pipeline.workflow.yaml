name: webhook_pipeline
version: "1.0"
description: |
  Webhook Pipeline — webhook trigger → validate sig → process → respond.
  Template tags: webhook, integration, signature, hmac.
steps:
  - type: activity
    name: validate_hmac_signature
    args:
      algorithm: hmac-sha256
    timeout_s: 10
  - type: activity
    name: process_payload
    timeout_s: 30
  - type: activity
    name: respond_with_ack
    args:
      status_code: 200
    timeout_s: 5
