# Sprint 5 — Multimodal RAG (PDF/image OCR и docling parsing).
# docling — IBM Research document parser (PDF/DOCX → structured Markdown).
# paddleocr — fallback OCR для scan-PDF; alternative: easyocr (lazy-выбор).
# K4 W1 (Sprint 8A): pypdfium2 — fast PDF parser с native wheels для py3.14
# (используется в PDFIngester c graceful fallback на pypdf).
# Pillow — обязателен для ImageIngester (EXIF + sniff).
