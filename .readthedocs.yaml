# ReadTheDocs Build Configuration (K1 Sprint 8 [wave:s8/k1-sphinx-multiversion]).
#
# Multi-version build: ReadTheDocs строит каждую активную версию через свою
# версионную систему; sphinx-multiversion — для self-hosted GitHub Pages.
# Здесь конфигурация для одиночной версии (RTD сам управляет переключателем).

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.14"
  jobs:
    pre_install:
      - pip install uv
    install:
      - uv sync --frozen --extra docs
    build:
      html:
        - uv run sphinx-build -b html docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf
