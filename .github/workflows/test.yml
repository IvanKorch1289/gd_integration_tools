name: test

# Sprint 3 W1 К5 / GAP-10: запуск pytest + coverage artifact.
# Codecov upload — опционален (только если задан secret CODECOV_TOKEN).

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    # Docker daemon доступен на ubuntu-latest по умолчанию (testcontainers).
    # При необходимости — добавить services: { docker: dind } для self-hosted runners.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          # TODO: при недоступности 3.14 — fallback на '3.14-dev' или '3.13'.
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Run pytest with coverage
        run: |
          uv run pytest tests \
              --cov=src/backend \
              --cov-report=xml \
              --cov-report=term \
              --maxfail=20

      - name: Coverage gate ([wave:s19/k2-w4-coverage-ratchet-75])
        # S19 K2 W4 — coverage gate ratchet 70% → 75%.
        # Threshold читается из .baselines/coverage.json (baseline-aware).
        # Любое падение coverage > 0.5% от baseline блокирует CI в --strict.
        run: |
          uv run python tools/check_coverage_gate.py \
              --coverage-xml coverage.xml \
              --baseline .baselines/coverage.json \
              --threshold 75

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Upload to Codecov (optional)
        # Шаг исполняется только когда задан CODECOV_TOKEN.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
