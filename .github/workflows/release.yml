name: release

# Sprint 3 W1 К5 / GAP-10: release dry-run.
# PyPI publish + cosign attestation — отложены на R3.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Нужна полная история для корректного построения версии.
          fetch-depth: 0

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          # TODO: при недоступности 3.14 — fallback на '3.14-dev' или '3.13'.
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Build distribution (sdist + wheel)
        run: uv build

      - name: Twine check (метаданные dist/*)
        # Dry-run верификация артефактов; реальная публикация — отложена на R3.
        run: uv run twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30
          if-no-files-found: error

      # TODO (R3 / Sprint 3+): добавить шаги
      #   - uv run twine upload dist/* --repository <pypi>
      #   - cosign sign-blob --yes <artifact>  (supply-chain V4)
      # Условие активации: явный approval + secret PYPI_TOKEN.
