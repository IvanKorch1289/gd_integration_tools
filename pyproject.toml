    "E501",
    "S104",
    "RUF001",
    "RUF002",
    "RUF003",
]

# Wave-6.1 lazy singletons:
#
#   * F822 — имена в ``__all__`` создаются через module-level
#     ``__getattr__`` shim (``lru_cache(maxsize=1)`` + lazy accessor);
#     Ruff не видит динамическое разрешение.
#   * E402 — ``from src.backend.core.di import app_state_singleton`` (и
#     обернутая ``@app_state_singleton`` фабрика) намеренно стоит
#     ПОСЛЕ определения класса — это разрывает circular import
#     ``core.di → infrastructure.X`` и сохраняет lazy-init.
#
# Файлы ниже — единственный список, где паттерны применены; добавление
# новой записи требует обновления.
#
# Streamlit pages: ``st.set_page_config()`` обязан вызываться **первым**
# Streamlit-вызовом (требование платформы), поэтому module-level imports
# после него — конвенция, не баг.
[tool.ruff.lint.per-file-ignores]
"src/backend/infrastructure/clients/external/circuit_breakers.py" = ["F822"]
"src/backend/infrastructure/clients/external/logger.py" = ["F822"]
"src/backend/infrastructure/clients/messaging/stream.py" = ["F822"]
"src/backend/infrastructure/clients/storage/redis.py" = ["F822"]
"src/backend/infrastructure/clients/storage/s3_pool.py" = ["F822"]
"tests/unit/infrastructure/secrets/test_vault_client.py" = ["F821"]  # F821: VaultClient импортируется локально в fixtures, не нужен на module-level
"src/backend/infrastructure/clients/transport/smtp.py" = ["F822"]
"src/backend/infrastructure/database/database.py" = ["F822"]
"src/backend/infrastructure/database/session_manager.py" = ["F822"]
"src/backend/infrastructure/external_apis/logging_service.py" = ["F822"]
"src/backend/core/resilience/breaker.py" = ["F822"]
"src/backend/infrastructure/resilience/breaker.py" = ["F822"]
"src/backend/infrastructure/scheduler/scheduler_manager.py" = ["F822"]
"src/backend/services/decorators/limiting.py" = ["F822"]
"src/backend/services/io/external_database.py" = ["F822"]
# DSPy is optional (lazy import) — F821 intentionally bypasses runtime import check.
"src/backend/services/ai/dspy/optimizer.py" = ["F821"]
"src/frontend/streamlit_app/app.py" = ["BLE001", "E402"]
"src/frontend/streamlit_app/pages/*.py" = ["BLE001", "E402"]
"src/frontend/streamlit_app/api_client.py" = ["BLE001"]
# Backend services: BLE001+S110 intentional (resilience, circuit breakers, fail-soft).
"src/backend/**" = ["BLE001", "S110", "S101", "S112"]
# Wave-6.1 lazy ``@app_state_singleton`` (E402: import после класса).
"src/backend/dsl/engine/plugin_registry.py" = ["E402"]
"src/backend/dsl/engine/tracer.py" = ["E402"]
"src/backend/entrypoints/mqtt/mqtt_handler.py" = ["E402"]
"src/backend/infrastructure/application/slo_tracker.py" = ["E402"]
"src/backend/infrastructure/application/vault_refresher.py" = ["E402"]
"src/backend/infrastructure/clients/external/express.py" = ["E402"]
"src/backend/infrastructure/clients/external/langfuse_client.py" = ["E402"]
"src/backend/infrastructure/clients/messaging/event_bus.py" = ["E402"]
"src/backend/infrastructure/clients/storage/clickhouse.py" = ["E402"]
"src/backend/infrastructure/clients/storage/elasticsearch.py" = ["E402"]
"src/backend/infrastructure/clients/storage/mongodb.py" = ["E402"]
"src/backend/infrastructure/database/pool_monitor.py" = ["E402"]
"src/backend/infrastructure/security/api_key_manager.py" = ["E402"]
# Tests: BLE001 intentional (fail-soft), S101/S105/S106/S311 pytest convention.
"tests/**/*.py" = ["S101", "S105", "S106", "S311", "BLE001", "S108", "S110"]
# testkit импортирует heavy-deps lazy внутри функций — допускается S404/S603.
"testkit/**/*.py" = ["S101", "F401", "F811", "S106", "S105", "S311", "BLE001"]
