# Kimi Code CLI — project-local config for gd_integration_tools
# Адаптация .claude/settings.json (Claude Code) под Kimi-формат.
# Источник правды по permission rules: .claude/settings.json
# Формат pattern:
#   - Claude Code: ToolName(arg:*)  с двоеточием
#   - Kimi Code:    ToolName(arg *)  с пробелом (shell-glob)
# Документация Kimi: https://moonshotai.github.io/kimi-code/en/configuration/config-files.html

# Модель по умолчанию (можно переопределить --model)
default_model = "kimi-k2-0905-preview"

# Skills: подключаем все 10 skills из .claude/skills/ (project scope)
# Kimi читает их в дополнение к .kimi-code/skills/
extra_skill_dirs = [".claude/skills"]

# Не отправлять анонимную телеметрию
telemetry = false

# Тема TUI
theme = "dark"

# Thinking mode: авто
[thinking]
mode = "auto"

# Параметры loop-control
[loop_control]
max_steps_per_turn = 100
max_retries_per_step = 3
reserved_context_size = 50000

# Фон
[background]
max_running_tasks = 4
agent_task_timeout_s = 900

# ──────────────────────────────────────────────────────────────────
# Permission rules
# Приоритет: deny > ask > allow. Первое совпадение побеждает.
# scope: user (по умолчанию) — применяется ко всем сессиям.
# ──────────────────────────────────────────────────────────────────

