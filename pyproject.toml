    "uvloop>=0.21.0,<1.0.0",
    "cloudevents>=1.10.0,<2.0.0",
    "fastavro>=1.9.0,<2.0.0",
    "casbin>=1.36.0,<2.0.0",
    "polars>=1.20.0,<2.0.0",
    "pyarrow>=20.0.0,<25.0.0",
    "duckdb>=1.5.2,<2.0.0",
    "dask[distributed]>=2026.3.0",
    "cachetools>=5.3.0,<8.0.0",
    "aiocache>=0.12.0,<1.0.0",  # S59 W4: async cache lib (v22 lib-table); S60+ migration plan в ADR-0086
    "motor>=3.5,<4.0",
    "elasticsearch[async]>=8.0,<9.0",
    "openapi-pydantic>=0.5.0,<1.0.0",
    "pypdf>=6.0,<7.0",  # S29 W2: 20 CVEs fixed in 6.0.0-6.10.2
    "python-docx>=1.1,<2.0",
    "markitdown>=0.1.5,<1.0.0",
    "whoosh-reloaded>=2.7.5,<3.0.0",
    "sentry-sdk[fastapi]>=2.20.0,<3.0.0",
    "typer>=0.12.0,<1.0.0",
    "pydash>=8.0,<9.0",
    "glom>=25.12.0",
