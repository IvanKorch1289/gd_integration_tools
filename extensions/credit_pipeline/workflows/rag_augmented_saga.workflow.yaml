name: rag_augmented_saga
version: "1.0"
description: |
  RAG-augmented credit assessment saga (Sprint 12 K4 W1).

  Шаги:
    1. Fetch credit data (внешний bureau).
    2. RAG query — legal/policy база через ``services.ai.rag_query``.
    3. LLM-decision через PydanticAI (structured output).
    4. Saga: fund_account / compensate refund_account.

  Template tags: ai, rag, saga, credit, compensation.
default_timeout_s: 300
steps:
  - type: activity
    name: fetch_credit_data
    args:
      bureau: equifax
      include_history_years: 5
    timeout_s: 60
  - type: activity
    name: rag_query_legal_policies
    args:
      function: services.ai.rag_query
      collection: legal_policies
      strategy: hybrid
      top_k: 5
      estimated_tokens: 2500
    timeout_s: 30
  - type: activity
    name: llm_credit_decision
    args:
      function: services.ai.llm_structured_decision
      model_id: claude-sonnet-4-6
      estimated_tokens: 3500
    timeout_s: 60
  - type: saga
    forward:
      - name: fund_account
        args: {account_type: credit}
        timeout_s: 60
    compensate:
      - name: refund_account
        timeout_s: 30
