name: adr-sync

on:
  push:
    branches: [master]
    paths:
      - "docs/adr/**"
      - "tools/generate_adr_index.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: adr-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral/setup-uv@v3

      - name: Generate ADR index
        run: uv run python tools/generate_adr_index.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/adr/INDEX.md; then
            echo "ADR index is up to date."
            exit 0
          fi
          git add docs/adr/INDEX.md
          git commit -m "docs: sync ADR index [skip ci]"
          git push
