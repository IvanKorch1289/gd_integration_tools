# S78 W2 — Production nginx reverse-proxy config для Streamlit.
#
# FINAL_REPORT_V2 P0-D closure: Streamlit не имеет встроенной поддержки
# security headers (X-Frame-Options, X-Content-Type-Options, CSP, HSTS).
# Production deployment использует nginx как reverse proxy.
#
# Этот файл — reference config, копируется в /etc/nginx/conf.d/
# при production deployment.
#
# Add to /etc/nginx/conf.d/streamlit.conf
#
# Usage:
#   sudo cp docs/deployment/nginx_streamlit.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx

upstream streamlit_backend {
    # Multiple workers для HA
    server 127.0.0.1:8501;
    # server 127.0.0.1:8502;  # second worker (если scaled)
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name admin.corp.example.ru;

    # SSL (Let's Encrypt или corp CA)
    ssl_certificate /etc/letsencrypt/live/admin.corp.example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.corp.example.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (FINAL_REPORT_V2 P0-D)
    add_header X-Frame-Options "SAMEORIGIN" always;  # Clickjacking protection
    add_header X-Content-Type-Options "nosniff" always;  # MIME sniffing
    add_header X-XSS-Protection "1; mode=block" always;  # XSS filter
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.corp.example.ru wss://admin.corp.example.ru; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # HSTS preload (после testing)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy to Streamlit
    location / {
        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit использует WS для live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (no auth)
    location /healthz {
        access_log off;
        return 200 "OK\n";
    }

    # Security: hide nginx version
    server_tokens off;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name admin.corp.example.ru;
    return 301 https://$host$request_uri;
}
