# Main composition demo route
# Demonstrates include: and extends: composition (S19 K3 W2)

extends: ./base_transforms.yaml

include:
  - ./shared_steps.yaml

route_id: composition.demo
source: http:POST /api/v1/composition/demo
description: Composition demo — extends base + includes shared steps

steps:
  - validate_request:
      schema:
        type: object
        properties:
          message: { type: string }
          amount: { type: number }
        required: [message]
  - transform:
      set:
        body.processed_by: "composition_demo"
        body.demo_id: "${uuid()}"
  - proxy:
      src: /api/v1/composition/demo
      dst: http://localhost:9000/demo
  - audit:
      action: "route.composition_demo.complete"

to:
  response:
    code: 200
    body:
      status: composed
      route_id: ${route_id}
      processed_by: ${body.processed_by}
      has_base: ${body.base_route}
      has_included_meta: ${body._meta.composition}