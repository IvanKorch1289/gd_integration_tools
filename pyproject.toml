[project.optional-dependencies]
ai = [
    # langgraph — multi-agent supervisor (StateGraph + handoff tools),
    # ReAct agent (create_react_agent), PostgresSaver checkpointer.
    # Lazy-import: langgraph imported inside functions, not at module level.
    "langgraph>=0.3.0",
    "langfuse>=2.0.0",
    # Wave 1.7 (S1 R-V15-4): изолированный sandbox для AI code-execution.
    # Lazy-import внутри infrastructure/ai/e2b_sandbox.py; при отсутствии
    # пакета или E2B_API_KEY используется NoOpSandbox (явный отказ).
    "e2b-code-interpreter>=1.0.0,<3.0.0",
    # K4 Sprint 6: AI evaluation framework + prompt optimization.
    # inspect-ai — UK AI Safety Institute eval framework (suites, scorers).
    # dspy-ai — Stanford DSPy programming model для LLM pipeline optimization.
    # Lazy-import внутри services/ai/eval/ и services/ai/dspy/;
    # отсутствие пакетов не ломает CLI (skip-режим).
    "inspect-ai>=0.3",
    "dspy-ai>=2.5",
]
security = [
    "presidio-analyzer>=2.2.0",
    # K1 S3 W3: supply-chain CI gate scaffold (BLOCKER #4).
    "cyclonedx-bom>=5.0.0",  # bumped from 4.x to resolve lxml>=6.1.0 conflict (PYSEC-2026-87)
    # pip-audit — vulnerability scanner поверх PyPI advisory database.
    # Инструменты используются через tools/checks/generate_sbom.py и
    # tools/checks/run_pip_audit.py (make sbom / make audit-deps).
    # S11 carryover: версии синхронизированы с [dev-group] выше — `uv sync
    # --extra security` теперь даёт ту же версию, что `uv sync` (dev).
    "pip-audit>=2.7,<3",
    # K4 Sprint 55 W5: user-approved performance libraries.
    # rich: terminal UI (tables, progress bars, syntax highlighting).
    "rich>=13.9.0,<14.0.0",
    # aioboto3: async boto3 wrapper for AWS S3 sensor (Airflow-style).
    "aioboto3>=13.0.0,<14.0.0",
]
# === K4 Sprint 24 W1 (ADR-NEW-16): Presidio + ru NER PII layer. ===
# presidio-anonymizer — replace/redact/hash операторы для PII;
# spacy + ru_core_news_lg — NER для русских ФИО/организаций/локаций;
# Python 3.14 требует spaCy >= 3.8.13 (thinc/blis wheels).
# `ru_core_news_lg` weights устанавливается через `python -m spacy download`
# в Dockerfile / make pii-bootstrap target (~1.5GB).
# Lazy-import в services/ai/pii/presidio_analyzer.py; default-OFF feature-flag
# PRESIDIO_PII_ENABLED — graceful fallback на AIDataSanitizer (regex).
# llm-guard (S35 W1) — self-hosted CPU scanner (MIT), replaces Rebuff/Lakera external APIs.
# NOTE: pip-only due to tiktoken conflict with pydantic-ai>=1.99.0 (ai-2026).
# Install separately: pip install llm-guard
ai-safety = [
    "presidio-analyzer>=2.2.0",
    "presidio-anonymizer>=2.2.0",
    "spacy>=3.8.13",
]
# === К1 Security (Sprint 1 V16, S6 DoD): SAML SP-initiated SSO + SLO. ===
# python3-saml тянет xmlsec (C-ext) — устанавливается отдельным extra,
# чтобы dev_light без libxmlsec1 не падал. Lazy-import в SamlBackend.
auth-saml = [
    "python3-saml>=1.16.0,<2.0.0",
]
mcp = [
    # ADR-0070 §3 (S27 W4): FastMCP 3.2.4+ required для JWTAuthProvider
    # (JWTVerifier from fastmcp.server.auth.providers.jwt).
    "fastmcp>=3.2.4"
]
rpa = [
    # K3 Sprint 8 [wave:s8/k3-rpa-universal-stage1]: patchright (anti-detection
    # форк playwright). Используется в RPA Universal Stage 1; подключён
    # параллельно с playwright (legacy), полная миграция — Sprint 9 K3.
    "patchright>=1.40.0,<2.0",
    "playwright>=1.48.0"
]
# K3 Sprint 8: OCR для извлечения текста со скриншотов / PDF.
# Опционально: тяжёлый paddlepaddle backend; lazy-import в processor.
# S16 gate-w0-ops-reorg-smoke (2026-05-21): paddlepaddle 2.6.2 не имеет
# wheels для cp314 (только cp38-cp312); 3.0 — major bump. paddleocr тоже
# требует paddlepaddle. Extras временно пуст до миграции на paddlepaddle 3.x
# или замены на pytesseract — pin'ы вернутся когда появятся 3.14-wheels.
rpa-ocr = [
    # Wave [wave:s18/w0-goal-driven-sweep-2-ocr]: pytesseract — lightweight
    # OCR backend (требует Tesseract на хосте; lazy-import в processor).
    "pytesseract>=0.3.10,<1.0",
    # "paddleocr>=2.8.0,<4",       # carryover: ждём cp314 wheels paddlepaddle.
    # "paddlepaddle>=2.6.0,<3",
]
# K3 Sprint 8 [wave:s8/k3-rpa-windows-desktop]: pywinauto Win32/UIA для
# desktop UI automation. Windows-only — устанавливается на windows-worker
# sidecar; на Linux/macOS sidecar возвращает 503.
rpa-windows = [
    "pywinauto>=0.6.8,<1.0",
    "pillow>=10.0,<13.0",  # S30: upped to <13.0 — Pillow 12.x officially supports Python 3.14
]
# Sprint 8 — HTTP/3 + WebTransport opt-in.
# aioquic — pure-Python QUIC/HTTP3 stack; cp314 wheels с 1.1.0 (cryptography>=42).
# Сервер запускается отдельно от Granian (см. src.backend.entrypoints.http3.server).
http3 = [
    "aioquic>=1.1.0,<2.0.0",
]
# Sprint 5 — DSL pilot batch: JsonPath / UnitConversion / IcsCalendar.
# Все три зависимости pure-Python (без C-extensions) и совместимы с Python 3.14.
# Lazy-import внутри процессоров — установка extra нужна только при реальном использовании.
dsl-extras = [
    "jsonpath-ng>=1.6.0,<2.0.0",
    "pint>=0.24.0,<1.0.0",
    "icalendar>=5.0.0,<7.0.0",
]
rag = [
    "sentence-transformers>=3.0.0,<6.0.0",
    "rank-bm25>=0.2.2,<1.0.0",
    "chromadb>=0.5.0,<2.0.0",  # SECURITY 2026-06-05: bump target 1.5.20 unavailable in PyPI (only <=1.5.9), pin reverted
]
# Wave F.4 (V10 #11): fastembed несовместим с Python 3.14 — нет
# onnxruntime wheels. Доступен только как opt-in для legacy-стендов на
# Python 3.12 / 3.13. Default RAG embedding-провайдер — sentence-transformers
# (см. services/ai/embedding_providers.py).
# S36 fix: fastembed конфликтует с huggingface-hub>=0.26.0 (core dep) и
# pydantic-ai>=1.99.0 (ai-2026 extra). fastembed — legacy opt-in (ONNX),
# на Python 3.13+ устанавливается вручную при необходимости.
# embeddings-fastembed-legacy = [
#     "fastembed>=0.4.0,<1.0.0",
# ]
# К4 MVP (Sprint S5): AI Stack 2026.
# litellm — unified LLM-gateway, pydantic-ai — typed agents,
# FlagEmbedding — BGE-M3 + reranker-v2-m3,
# instructor — structured-output fallback. Default-OFF в settings.
ai-2026 = [
    "litellm>=1.0.0,<2.0.0",  # S30: lowered to >=1.0.0 — CVE-2026-42208 fix available from 1.0.0
    "pydantic-ai>=1.99.0,<2.0.0",  # S31: >=1.99.0 fixes GHSA-cqp8-fcvh-x7r3 (CVE-2026-46678, SSRF via IPv4-mapped IPv6). 1.94.0 was in vulnerable range >=1.56.0,<1.99.0. adapter.py LiteLLMModel shim needs rewrite for 1.x Model ABC — default-OFF until S32 W2.
    # REMOVED langmem: zero imports, custom memory consolidation (UnifiedMemoryGateway)
    # is better suited for self-hosted. Long-term memory via LangMem requires managed
    # cloud — not compatible with self-hosted-first constraint.
    # NOTE: inscriptis (dep of FlagEmbedding) requires lxml<6.1.0 which conflicts
    # with core lxml>=6.1.1 (PYSEC-2026-87 fix). Install ai-2026 extra in isolated
    # ML environments to avoid lxml downgrade. S31: tracking fix in inscriptis upstream.
    "FlagEmbedding>=1.3.0,<2.0.0",
    "instructor>=1.7.0,<2.0.0",
]
# K4 Sprint 8 [wave:s8/k4-model-registry]: AI Model Registry — MLflow +
# Hugging Face Hub. Используется через services/ai/model_registry/.
# mlflow ~150MB (тянет gunicorn, alembic, sqlalchemy-bind); HF Hub лёгкий.
ai-model-registry = [
    "mlflow>=3.10.0,<4",  # S30: upped to >=3.10.0 — CVE-2026-2652 auth bypass fix
                           # NOTE: mlflow 3.x requires starlette<1.0.0 which conflicts with
                           # core starlette>=1.0.1 (PYSEC-2026-161). Install ai-model-registry
                           # extra in isolated environments (dedicated MLflow server container).
    # S31: снят upper bound <1 -> <2 для совместимости с transformers>=5.0.0
    # (transformers 5.x требует huggingface_hub>=1.3.0).
    "huggingface_hub>=0.27,<2",
]
# K4 Sprint 7: voice STT/TTS extras (Whisper + Coqui TTS).
# openai-whisper — speech-to-text (multilingual, including ru).
# TTS (Coqui) — text-to-speech (XTTS v2 multilingual). Опциональный
# (тяжёлый pin torch + heavy weights). Lazy-import внутри
# services/ai/voice/. Activate via feature_flag voice_stt_tts_enabled.
#
# Sprint 11 S10-carryover [wave:s10-carryover/uv-resolver-fix]: эти
# пакеты на момент 2026-05 не имеют wheels для Python 3.14
# (torch/torchaudio transitive deps). Помечены environment-marker
# `python_version < "3.14"` — на 3.14 lazy-import возвращает skip-mode.
# S36 fix: ai-voice конфликтует с markitdown→numpy>=2.1.0 (core dep).
# Устанавливается вручную при необходимости.
# ai-voice = [
#     "openai-whisper>=20240930; python_version < '3.14'",
#     "TTS>=0.22,<1; python_version < '3.14'",
# ]
# Wave D.2 (ADR-045): Temporal SDK как opt-in для default workflow
# backend. cp314 wheels доступны с 1.19.0; ~15-20MB. Lazy-import
# внутри TemporalWorkflowBackend.__init__ — dev-light без SDK.
workflow = [
    "temporalio>=1.27.0,<2.0.0",
]
dev-light = [
    "aiosqlite>=0.20.0,<1.0.0",
]
sources-cdc = [
    "psycopg[binary]>=3.1,<4.0.0",
]
sources-mq-nats = [
    "faststream[nats]>=0.6.7,<1.0.0",
]
# PLAN V20 (Sprint 16 K1 W4 closure): scaffolding-extras удалены — iot/web3/
# legacy/banking/enterprise/datalake/temporal/beam не наполнены за 5 спринтов;
# temporalio уже в base deps. Возврат — через явный wave-tag с реальным scope.

# Sprint 16 NEW extras (V20):
lsp = [
    "pygls>=2.0.0",  # S16 K3 W1: LSP server для DSL (route.toml + workflow.yaml)
]
circuit-breaker = [
    "pybreaker>=1.2.0",  # S16 K2 W4: pybreaker заменяет custom CB (state via Redis backend)
]
perf = [
    "locust>=2.43.4,<3.0.0",
    "pytest-benchmark>=5,<6",
]
# К5 (Wave K5/testkit): heavy-зависимости testkit-фикстур (toxiproxy,
# temporal-env, respx). Без extra fixtures деградируют до pytest.skip,
# поэтому core-юзеру extra не обязателен.
testkit = [
    "testcontainers[postgres,redis,kafka]>=4.7.2,<5.0.0",
    "respx>=0.22,<1",
    "temporalio>=1.27.0,<2.0.0",
    # Sprint 10 K5 W6 [wave:s10/backbone]: VCR-style cassette recorder.
    # vcrpy — запись/replay HTTP-трафика; pure-Python, cp314-совместим.
    # Lazy-import внутри testkit.cassette. Обёртка @cassette() поверх
    # существующего testkit/recorder.py (HAR-style → VCR API).
    "vcrpy>=6.0.0,<7.0.0",
]
# К10 Sprint-2 Wave 5: Sphinx scaffold + Diátaxis structure.
# sphinx / myst-parser / sphinx-copybutton уже в [dev] dependency-group;
# этот extra позволяет установить только doc-deps без full dev-стека.
# pydata-sphinx-theme выбрана вместо furo (уже используется в dev).
docs = [
    "sphinx>=9.1.0,<10.0.0",
    "myst-parser>=5.0.0,<6.0.0",
    "sphinx-copybutton>=0.5,<1",
    "pydata-sphinx-theme>=0.16.0,<1.0.0",
    # K1 Sprint 8: multi-version docs build (master + release/* + v* tags).
    # sphinx-multiversion — стабильная и проверенная утилита; интегрируется
    # с любым Sphinx-проектом через расширение + 4 smv_* настройки.
    "sphinx-multiversion>=0.2.4,<1.0.0",
]
# K5 Sprint 8 [wave:s8/k5-ru-proofreader]: optional ru-language proofreader.
# language-tool-python тянет ~500MB JVM + словари; в core не нужен,
# Streamlit Wiki показывает helpful warning при отсутствии.
docs-ru = [
    "language-tool-python>=2.8,<3",
]
# Sprint 5 — DSL расширения batch 2: webhook signature / pdf / template / archive.
# Все зависимости pure-Python (либо имеют готовые wheels) и совместимы с Python 3.14.
# Lazy-import внутри процессоров; extra нужен только при реальном использовании.
dsl-extras-2 = [
    "standardwebhooks>=1.0.0,<2.0.0",
    "reportlab>=4.0.0,<5.0.0",
