name: release

# Sprint 3 W1 К5 / GAP-10: release dry-run.
# PyPI publish + cosign attestation — отложены на R3.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Нужна полная история для корректного построения версии.
          fetch-depth: 0

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          # TODO: при недоступности 3.14 — fallback на '3.14-dev' или '3.13'.
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Build distribution (sdist + wheel)
        run: uv build

      - name: Twine check (метаданные dist/*)
        # Dry-run верификация артефактов; реальная публикация — отложена на R3.
        run: uv run twine check dist/*

      - name: Generate SBOM (CycloneDX)
        # Sprint 9 K1 W5: SBOM as release artifact
        run: |
          uv run python tools/checks/generate_sbom.py \
            --output dist/sbom.cdx.json
        continue-on-error: false

      - name: pip-audit dependency vulnerability scan
        run: |
          uv run pip-audit --strict --output dist/pip-audit.json \
            --format json || true
        continue-on-error: true

      - name: Cosign sign artifacts
        # Sprint 9 K1 W5: cosign keyless sign через OIDC
        # Активируется только если COSIGN_EXPERIMENTAL=1 и Sigstore доступен
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          if command -v cosign >/dev/null 2>&1; then
            uv run python tools/checks/cosign_sign_all.py \
              --dist-dir dist/ \
              --keyless || echo "cosign sign skipped (sigstore unavailable)"
          else
            echo "cosign not installed; skipping signing"
          fi
        continue-on-error: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: |
            dist/
            !dist/*.cdx.json
            !dist/*.sig
            !dist/*.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload SBOM + signatures
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-signatures-${{ github.ref_name }}
          path: |
            dist/*.cdx.json
            dist/*.sig
            dist/pip-audit.json
          retention-days: 90
          if-no-files-found: warn

      # TODO (R3 / Sprint 10+): активировать публикацию
      #   - uv run twine upload dist/*.whl dist/*.tar.gz --repository <pypi>
      # после secret PYPI_TOKEN + явный approval.
