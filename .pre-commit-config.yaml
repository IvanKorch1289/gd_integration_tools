# Pre-commit конфигурация: автоматические проверки при git commit.
# Устанавливается командой `make pre-commit` или `uv run pre-commit install`.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: check-layers
        name: "Архитектурный линтер слоёв (ADR-001)"
        entry: uv run python tools/check_layers.py
        language: system
        types: [python]
        pass_filenames: false

      # S113 W4 — auto-prune stale allowlist entries on pre-push (CI gate).
      # Complement к S112 W1 --prune-allowlist flag: запускает prune
      # и warn'ит если stale entries > 0. Не блокирует push (т.к. prune
      # может быть артефактом legacy fix в том же commit'е).
      - id: check-layers-prune
        name: "Auto-prune stale layer-allowlist entries (S113 W4)"
        entry: tools/hooks/check_layers_prune.sh
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: check-compat
        name: "Совместимость с Python 3.12+"
        entry: uv run python tools/check_compat.py
        language: system
        types: [python]
        pass_filenames: false

      # S78 W3 (FINAL_REPORT_V2 P0-D) — Streamlit config security gate.
      # Verifies config.toml has secure CORS/XSRF defaults (CSRF ON,
      # explicit CORS allowlist, no wildcard, gatherUsageStats off).
      - id: check-streamlit-security
        name: "Streamlit config security (CORS/XSRF/gatherUsageStats)"
        entry: uv run python tools/check_streamlit_security.py
        language: system
        types: [toml]
        pass_filenames: false

      # Wave F.6 — docstring policy gate. Запускается только при push,
      # чтобы не тормозить локальные commit'ы. Игнорирует пункты в
      # tools/check_docstrings_allowlist.txt (амнистия baseline);
      # любой НОВЫЙ пропущенный docstring блокирует push.
      - id: check-docstrings
        name: "Docstring policy (Wave F.6 / Roadmap V10 #12) — extended S101 W3"
        # S101 W3: extended from 3 dirs → 6 dirs (added services, entrypoints, infrastructure, ai).
        # Old: src/backend/core src/backend/dsl/engine src/backend/core/interfaces
        # Amnesty baseline для services/entrypoints/infrastructure в tools/check_docstrings_allowlist.txt
        # (snapshot S101 W3). Реальный ratchet начинается с S102+ W1.
        entry: uv run python tools/check_docstrings.py src/backend/core src/backend/dsl src/backend/dsl/engine src/backend/core/interfaces src/backend/services src/backend/entrypoints src/backend/infrastructure src/backend/ai
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      # S73 W3 (FINAL_REPORT_V2.md P0-A): CI gate для предотвращения
      # `except A, B:` semantic bug (Python 3.14 silent semantic bug).
      # Codemod tools/fix_except_bug.py существует с S60 W3, но
      # regression был возможен т.к. compileall passes. Этот hook
      # запускает dry-run codemod и fail'ит commit если 1+ legacy
      # pattern detected.
      - id: check-except-bug
        name: "Except A, B: semantic bug gate (P0-A, FINAL_REPORT_V2)"
        entry: uv run python tools/fix_except_bug.py --dry-run src/
        language: system
        types: [python]
        pass_filenames: false
        # S73 W3: запускаем только в pre-push (не каждый commit)
        # для скорости. CI gate остаётся в pre-push hook.
        stages: [pre-push]

      # Wave R1.2 — V11 manifest schemas + capability catalog gate.
      # Запускается только при push: артефакты редко меняются, нет смысла
      # тратить время на каждый локальный commit.
      - id: v11-artefacts-check
        name: "V11 manifest schemas + capability catalog в синке"
        entry: uv run python tools/check_v11_artefacts.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      # Wave P0 — Python 3 syntax gate: блокирует commit при except A, B:
      - id: check-python3-syntax
        name: "Python 3 syntax gate (except-tuple-no-paren)"
        entry: uv run python tools/checks/check_python3_syntax.py --root src
        language: system
        types: [python]
        pass_filenames: false

      # TODO (V15 GAP Gap 4 follow-up): добавить hook `discover-plugin-caps`,
      # который будет рекомендовать (НЕ блокировать) capabilities для
      # `extensions/*/plugin.py` через `tools/discover_plugin_capabilities.py`.
      # Планируемая команда: `uv run python tools/discover_plugin_capabilities.py
      # extensions/<changed_plugin>` на pre-push. Сейчас не реализовано —
      # ждём стабилизации формата вывода и интеграции с plugin.toml.
