# Pre-commit конфигурация: автоматические проверки при git commit.
# Устанавливается командой `make pre-commit` или `uv run pre-commit install`.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: check-layers
        name: "Архитектурный линтер слоёв (ADR-001)"
        entry: uv run python scripts/check_layers.py
        language: system
        types: [python]
        pass_filenames: false

      - id: check-compat
        name: "Совместимость с Python 3.12+"
        entry: uv run python scripts/check_compat.py
        language: system
        types: [python]
        pass_filenames: false

      # Wave F.6 — docstring policy gate. Запускается только при push,
      # чтобы не тормозить локальные commit'ы. Игнорирует пункты в
      # tools/check_docstrings_allowlist.txt (амнистия baseline);
      # любой НОВЫЙ пропущенный docstring блокирует push.
      - id: check-docstrings
        name: "Docstring policy (Wave F.6 / Roadmap V10 #12)"
        entry: uv run python tools/check_docstrings.py src/core src/dsl/engine src/core/interfaces
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
