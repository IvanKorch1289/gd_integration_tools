name: lint

# Sprint 3 W1 К5 / GAP-10: статический линт и архитектурные gates.
# Запускается на push в master и на pull_request.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          # TODO: при недоступности 3.14 в setup-python на GitHub-runners
          # временно использовать '3.14-dev' или fallback на '3.13'.
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Ruff check (lint)
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: isort check (best-effort)
        # isort может отсутствовать в окружении — не блокировать PR при этом.
        run: |
          if uv run isort --version >/dev/null 2>&1; then
            uv run isort --check-only src tests
          else
            echo "isort не установлен — шаг пропущен"
          fi

      - name: Architectural layers gate (check_layers)
        # tools/check_layers.py лежит плоско в tools/, без подкаталога checks/.
        run: uv run python tools/check_layers.py

      - name: Docstring policy gate (check_docstrings --strict)
        # TODO: убрать continue-on-error после очистки baseline-issues
        # (см. tools/check_docstrings_allowlist.txt).
        continue-on-error: true
        run: uv run python tools/check_docstrings.py --strict
