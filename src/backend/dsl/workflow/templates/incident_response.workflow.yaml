name: incident_response
version: "1.0"
description: |
  Incident Response — detect → triage → notify → mitigate (HITL approve).
  Template tags: ops, incident, alerting, hitl.
steps:
  - type: activity
    name: detect_anomaly
    args:
      detector: prometheus_rule
    timeout_s: 60
  - type: activity
    name: triage_severity
    args:
      threshold: high
    timeout_s: 30
  - type: activity
    name: notify_oncall
    args:
      channel: pagerduty
    timeout_s: 30
  - type: wait_signal
    signal_name: incident_approved
    timeout_s: 1800
  - type: activity
    name: mitigate_action
    args:
      runbook: auto_restart_service
    timeout_s: 120
