# Grafana provisioning — ClickHouse datasource (Sprint 12 K2 W1).
#
# Подключается через vertamedia-clickhouse-datasource plugin.
# Url берётся из env vars (.env / docker-compose):
#   CLICKHOUSE_HOST, CLICKHOUSE_PORT (HTTP-interface 8123).

apiVersion: 1

datasources:
  - name: ClickHouse
    type: vertamedia-clickhouse-datasource
    access: proxy
    url: ${CLICKHOUSE_HTTP_URL:http://clickhouse:8123}
    database: ${CLICKHOUSE_DB:default}
    user: ${CLICKHOUSE_USER:default}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:}
    jsonData:
      defaultDatabase: ${CLICKHOUSE_DB:default}
      timeout: 30
      protocol: http
    editable: false
