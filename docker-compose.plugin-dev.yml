# docker-compose.plugin-dev.yml (Sprint 10 K5 W4, DX-8.6)
# Минимальный infra-only стек для plugin-dev mode.
# Запуск: docker compose -f docker-compose.plugin-dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gd_dev
      POSTGRES_USER: gd
      POSTGRES_PASSWORD: gd
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gd"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mock S3 (moto): даёт API-совместимый endpoint без AWS.
  mock-s3:
    image: motoserver/moto:latest
    ports:
      - "5001:5000"
    environment:
      MOTO_SERVICE: s3

volumes:
  pgdata_dev:
