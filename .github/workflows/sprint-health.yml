# Sprint Health Check CI gate
# Per S177/S178 audit-mode + refactoring master plan (ST-2).
# Runs `tools/verify_sprint_health.py` для 5 quick signals:
# audit-event wiring, pre-commit hooks, secret detector, strength
# validators, workspace isolation.
# Lightweight (< 5 sec), non-blocking (default exit 0). Use --strict
# для blocking gate (M10.4 / sprint-1 finalization).

name: sprint-health

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sprint-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync deps
        run: uv sync

      - name: Sprint health check (5 quick signals)
        # S177/S178 ST-2: tools/verify_sprint_health.py integration.
        # Default mode (exit 0 на warnings) для non-blocking CI gate.
        # Override в sprint-close PR = --strict (exit 1 на warnings).
        run: |
          uv run python tools/verify_sprint_health.py
