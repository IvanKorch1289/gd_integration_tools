# R2 Blueprint: credit_scoring — BKI fetch → ML score → decision.
# Wave [wave:s10/k3-w1-blueprint-library-15].

blueprint: credit_scoring
version: "1.0.0"
description: "Credit scoring pipeline: customer → BKI → ML score → решение."
tags: [credit, ml, business]

params:
  - { name: route_id, type: string, required: true }
  - { name: bki_provider, type: string, required: true }
  - { name: score_model, type: string, required: true }
  - { name: threshold_approve, type: number, required: true }
  - { name: threshold_decline, type: number, required: true }

from:
  http:
    method: POST
    path: /api/v1/credit/${blueprint.route_id}

steps:
  - validate_request:
      schema:
        type: object
        required: [customer_id, amount]
  - http_call:
      url: "${bki.${blueprint.bki_provider}.url}/query/${body.customer_id}"
      to: body.bki_report
  - ml_inference:
      model: "${blueprint.score_model}"
      input: "${body.bki_report}"
      to: body.score
  - choice:
      when:
        - condition: "body.score >= ${blueprint.threshold_approve}"
          steps:
            - set_property:
                decision: approve
        - condition: "body.score <= ${blueprint.threshold_decline}"
          steps:
            - set_property:
                decision: decline
        - condition: "true"
          steps:
            - set_property:
                decision: manual_review
            - hitl_request:
                topic: credit.manual_review
  - audit:
      action: blueprint.credit_scoring.decided
      metadata_from:
        score: body.score
        decision: exchange.decision

to:
  response:
    code: 200
    body:
      score: "${body.score}"
      decision: "${exchange.decision}"
