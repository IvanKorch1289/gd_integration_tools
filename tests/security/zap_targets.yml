# OWASP ZAP baseline targets (Sprint 6 К1 wave [s6/k1-owasp-zap-gate]).
#
# Список endpoint'ов для baseline-сканирования. ZAP выполняет
# spider+passive scan для каждого URL. Активные сканы (active scan)
# и authentication-flows откладываются до Sprint 9.
#
# Использование:
#   python tools/checks/check_owasp_zap.py --targets-file tests/security/zap_targets.yml
#
# baseline: zaproxy/zaproxy:stable (warn-only).
# version: 1.0

baseline: zaproxy/zaproxy:stable
version: 1.0

targets:
  - path: /health
  - path: /api/v1/health
  - path: /api/v1/admin/users
  - path: /api/v1/admin/orders
  - path: /api/v1/admin/plugins
