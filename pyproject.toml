    "argon2-cffi>=23.1.0,<24.0.0",
    "aiosmtplib>=3.0.2,<4.0.0",
    "sqlalchemy-utils>=0.41.2,<1.0.0",
    "starlette>=1.0.1,<2.0.0",  # S30 W1: PYSEC-2026-161 fix (0.x lacks the fix)
