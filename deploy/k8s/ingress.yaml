# K-OPS-2 (Sprint 17 W17): Ingress (TLS + nginx) для main app.
#
# Pre-requisites:
#   * ingress-nginx controller в кластере;
#   * cert-manager + ClusterIssuer `letsencrypt-prod` для TLS;
#   * DNS A-запись `api.gd-integration.local` → ingress LB IP.
#
# В production обычно используется свой WAF/CDN перед ingress
# (см. core/net/outbound_http.py WAF facade — для outbound тоже).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gd-app
  namespace: gd-integration
  labels:
    app.kubernetes.io/name: gd-integration-tools
    app.kubernetes.io/component: app
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Rate-limit на edge (per-IP); fastapi-limiter работает per-tenant.
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # WAF: ModSecurity OWASP CRS — рекомендуется в production.
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    # cert-manager TLS.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.gd-integration.local
      secretName: gd-app-tls
  rules:
    - host: api.gd-integration.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gd-app
                port:
                  number: 80
