name: multi_step_approval
version: "1.0"
description: |
  Multi-Step Approval — request → manager → director → finance (HITL chain).
  Template tags: approval, hitl, hierarchy, signoff.
steps:
  - type: activity
    name: submit_request
    timeout_s: 30
  - type: wait_signal
    signal_name: manager_approved
    timeout_s: 86400
  - type: wait_signal
    signal_name: director_approved
    timeout_s: 86400
  - type: wait_signal
    signal_name: finance_approved
    timeout_s: 86400
  - type: activity
    name: finalize_approval
    timeout_s: 30
