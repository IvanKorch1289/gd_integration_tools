# R2 Blueprint: dlq_replay — DLQ scan → re-dispatch.
# Wave [wave:s10/k3-w1-blueprint-library-15].

blueprint: dlq_replay
version: "1.0.0"
description: "DLQ scan → filter → re-dispatch in target queue."
tags: [resilience, dlq]

params:
  - { name: route_id, type: string, required: true }
  - { name: source_dlq, type: string, required: true }
  - { name: target_queue, type: string, required: true }
  - { name: filter_function, type: string, required: false }
  - { name: max_replay, type: number, required: false }

from:
  http:
    method: POST
    path: /api/v1/admin/dlq/${blueprint.route_id}/replay

steps:
  - dlq_scan:
      queue: ${blueprint.source_dlq}
      limit: ${blueprint.max_replay}
      to: body.batch
  - call_function:
      ref: ${blueprint.filter_function}
      input: body.batch
      to: body.eligible
  - for_each:
      list: body.eligible
      steps:
        - sink_publish:
            sink_kind: kafka
            topic: ${blueprint.target_queue}
            payload: ${item}
        - audit:
            action: blueprint.dlq_replay.requeued
            metadata_from: { dlq: blueprint.source_dlq, id: item.id }

to:
  response:
    code: 200
    body: { requeued: "body.eligible | length" }
