groups:
  - name: gd_integration_tools_ai
    interval: 30s
    rules:
      - record: ai_gateway:success_rate_5m
        expr: |
          sum(rate(agent_calls_total{status="success"}[5m]))
          / sum(rate(agent_calls_total[5m]))

      - record: ai_gateway:p95_latency_5m
        expr: |
          histogram_quantile(0.95, rate(agent_execution_seconds_bucket[5m]))

      - record: ai_gateway:p99_latency_5m
        expr: |
          histogram_quantile(0.99, rate(agent_execution_seconds_bucket[5m]))

      - record: ai_gateway:cost_per_call_usd_5m
        expr: |
          increase(agent_cost_usd_total[5m])
          / increase(agent_calls_total[5m])
        labels:
          unit: usd_per_call

      - record: ai_gateway:tool_calls_per_session_5m
        expr: |
          rate(agent_tool_calls_total[5m])
        labels:
          unit: calls_per_sec

  - name: gd_integration_tools_resilience
    interval: 30s
    rules:
      - record: cb:failure_rate_5m
        expr: |
          rate(cb_breaker_calls_total{status="failure"}[5m])
          / rate(cb_breaker_calls_total[5m])

      - record: cb:open_state_ratio_5m
        expr: |
          avg(cb_breaker_state == 2)
        labels:
          state: open

  - name: gd_integration_tools_rate_limiting
    interval: 30s
    rules:
      - record: ratelimit:rejection_rate_5m
        expr: |
          rate(pyrate_limiter_rejected_total[5m])
          / (rate(pyrate_limiter_requests_total[5m]) + rate(pyrate_limiter_rejected_total[5m]))

  - name: gd_integration_tools_semantic_cache
    interval: 30s
    rules:
      - record: semantic_cache:hit_rate_5m
        expr: |
          sum(rate(semantic_cache_hits_total[5m]))
          / (sum(rate(semantic_cache_hits_total[5m])) + sum(rate(semantic_cache_misses_total[5m])))

  - name: gd_integration_tools_sla
    interval: 60s
    rules:
      - record: sla:http_success_rate_5m
        expr: |
          sum(rate(http_requests_total{status=~"2.."}[5m]))
          / sum(rate(http_requests_total[5m]))

      - record: sla:ai_success_rate_5m
        expr: |
          sum(rate(ai_graph_calls_total{status="success"}[5m]))
          / sum(rate(ai_graph_calls_total[5m]))

      - record: sla:ai_p95_latency_5m
        expr: |
          histogram_quantile(0.95, rate(ai_graph_request_duration_seconds_bucket[5m]))
