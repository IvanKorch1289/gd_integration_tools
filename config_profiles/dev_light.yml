# Профиль dev_light — лёгкий локальный запуск без Docker.
#
# Накладывается поверх config.yml после загрузки, замещает только указанные
# ключи. Активируется переменной APP_PROFILE=dev_light.
#
# Цель: SQLite вместо PostgreSQL, LocalFS вместо S3, in-memory вместо Redis,
# без Mongo/Elasticsearch/ClickHouse.

database:
  type: sqlite
  path: ./.run/dev.sqlite3
  host: localhost
  port: 0
  name: dev
  username: ""
  password: ""
  ssl_mode: null
  ca_bundle: null

# LocalFS вместо S3: ``provider=local`` пропускает s3_client startup
# (см. _s3_enabled в setup_infra.py).
fs:
  enabled: true
  provider: local
  local_storage_path: ./.run/storage

redis:
  enabled: false

mongo:
  enabled: false

elasticsearch:
  enabled: false

clickhouse:
  enabled: false

cache:
  backend: memory
  l1_enabled: true

# Отключение Graylog (graypy не входит в [dev-light] extras).
log:
  host: ""

# Внешние БД (Oracle/PG из vault) — для dev_light пустой список,
# чтобы не падать на отсутствующих username/password в Vault.
external_databases:
  connections: []


