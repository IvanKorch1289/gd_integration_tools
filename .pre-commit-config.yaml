# Pre-commit hooks для gd_integration_tools.
#
# Установка: `pip install pre-commit && pre-commit install --hook-type pre-commit
#            --hook-type commit-msg`.
# Запуск вручную на всех файлах: `pre-commit run --all-files`.
#
# Хуки блокируют коммит при ошибках lint, проблемах форматирования, утечках
# секретов, нарушении commit-формата [phase:<ID>], отсутствии ADR или попытке
# добавить тестовую инфраструктуру (политика "no tests" — требование заказчика).

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.0, types-PyYAML, types-redis]
        args: [--ignore-missing-imports, --no-strict-optional]
        pass_filenames: false
        entry: mypy src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: poetry\.lock

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # Локальные hooks — политика "no tests" + anti-forget.
  - repo: local
    hooks:
      - id: no-tests
        name: hard-block on test infrastructure
        entry: python3 tools/check_no_tests.py
        language: system
        types: [file]
      - id: phase-order
        name: phase-order guard
        entry: python3 tools/check_phase_order.py
        language: system
        pass_filenames: false
      - id: deps-matrix
        name: dependency-matrix cross-check
        entry: python3 tools/check_deps_matrix.py
        language: system
        pass_filenames: false
      - id: phase-commit
        name: [phase:<ID>] commit format
        entry: python3 tools/check_phase_commit.py
        language: system
        stages: [commit-msg]
      - id: adr-link
        name: ADR link in commit body
        entry: python3 tools/check_adr_link.py
        language: system
        stages: [commit-msg]
      - id: update-progress
        name: update PROGRESS.md + PHASE_STATUS.yml
        entry: python3 tools/update_progress.py
        language: system
        stages: [commit-msg]
