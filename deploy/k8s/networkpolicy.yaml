# K-OPS-2 (Sprint 17 W17): NetworkPolicy default-deny + explicit allow.
#
# Архитектура: zero-trust внутри namespace.
#   * default-deny ingress + egress для всех pod'ов;
#   * явные правила для app/worker/migration → DB/Redis/Temporal/Vault/OTel.
#
# Требуется CNI с NetworkPolicy support (Cilium / Calico / Weave).
---
# 1) Default-deny всё.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gd-integration
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 2) DNS egress разрешён всем (CoreDNS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gd-integration
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3) Main app ingress: только от ingress-nginx + Prometheus (metrics).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gd-app-ingress
  namespace: gd-integration
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gd-integration-tools
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
---
# 4) Main app egress: DB / Redis / Temporal / Vault / OTel / S3 (proxy).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gd-app-egress
  namespace: gd-integration
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gd-integration-tools
  policyTypes:
    - Egress
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Temporal frontend
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: temporal
      ports:
        - protocol: TCP
          port: 7233
    # Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # OTel Collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Outbound HTTPS — через WAF (core/net/outbound_http.py) → egress gateway.
    # Direct external traffic — explicit allowlist в production.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: egress-gateway
      ports:
        - protocol: TCP
          port: 443
