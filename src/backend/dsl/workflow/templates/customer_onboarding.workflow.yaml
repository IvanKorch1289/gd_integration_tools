name: customer_onboarding
version: "1.0"
description: |
  Customer Onboarding — collect docs → KYC → AML → approve (parallel KYC+AML).
  Template tags: kyc, aml, onboarding, customer.
steps:
  - type: activity
    name: collect_documents
    args:
      doc_set: full_kyc
    timeout_s: 120
  - type: saga
    forward:
      - name: kyc_check
        args: {provider: dadata}
        timeout_s: 60
      - name: aml_check
        args: {provider: world_check}
        timeout_s: 60
    compensate:
      - name: rollback_provisional_account
        timeout_s: 30
  - type: wait_signal
    signal_name: kyc_aml_approved
    timeout_s: 3600
  - type: activity
    name: provision_customer_account
    args:
      tier: basic
    timeout_s: 60
