# Версия: 2026-05-21
# Источник: PLAN.md V22 §S17 (197–256), ADR-NEW-1..4, GAP-аудит 2026-05-21
#
# Назначение:
#   - каждая команда имеет owned_paths — единственный owner для PR-review;
#   - при смежной правке (файл в зоне 2+ команд) — issue + PR review от обоих;
#   - pre-commit hook tools/check_team_ownership.py валидирует структуру.
#
# Формат:
#   [meta]
#   [team.<id>] — обязательны: name / goal / owned_paths / worktree
#                 опционально: shared_with / waves
#   [blockers.<id>] — обязательны: title / owner_team / eta / dod / risk

